<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIRONI</title>

  <style>

    body {
      margin: 0;
       font-family: 'Poppins', sans-serif;
      background: #f2f4f8;
    }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 24px;
    }

    /* CARD */
    .card {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .girone {
      font-weight: bold;
      margin-bottom: 10px;
      color: #0072ff;
    }

    .match {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
    }

    .match span {
      line-height: 1.2;
    }

    .score {
      font-weight: bold;
    }

    .center {
      text-align: center;
    }

    .status {
      font-size: 12px;
      color: gray;
      margin-top: 3px;
    }

    .winner {
      color: green;
      font-weight: bold;
    }

    .loser {
      color: red;
    }

    /* ACCORDION */

    .accordion {
      margin: 15px;
    }

    .accordion-header {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);

      padding: 15px;
      border-radius: 18px;

      display: flex;
      justify-content: space-between;
      align-items: center;

      cursor: pointer;

      box-shadow: 0 6px 18px rgba(0,0,0,0.08);

      transition: all 0.3s ease;
    }

    .accordion-header:hover {
      transform: scale(1.01);
    }

    .accordion-header h2 {
      margin: 0;
      font-size: 18px;
      color: #0072ff;
    }

    .arrow {
      font-size: 18px;
      transition: transform 0.35s ease;
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;

      opacity: 0;
      transform: translateY(-10px);

      transition:
        max-height 0.5s ease,
        opacity 0.4s ease,
        transform 0.4s ease;

      border-radius: 15px;
    }

    .accordion.open .accordion-content {
      max-height: 10000px;
      opacity: 1;
      transform: translateY(0);
    }

    .accordion.open .arrow {
      transform: rotate(90deg);
    }

    /* MENU */

    .menu {
      position: fixed;
      bottom: 0;
      left: 0;

      width: 100%;

      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);

      display: flex;
      justify-content: space-around;
      align-items: center;

      padding: 14px 0;

      border-top-left-radius: 24px;
      border-top-right-radius: 24px;

      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);

      transition: all 0.35s ease;
    }

    .menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;

      text-decoration: none;
      color: #555;

      font-size: 12px;
      font-weight: 600;
    }

    .menu-item img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    .menu-item.active {
      color: #0066ff;
    }

    .spacer {
      height: 90px;
    }

  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h1>GIRONI</h1>
</div>

<!-- =======================
     ACCORDION COMPOSIZIONE
======================== -->
<div class="accordion">

  <div class="accordion-header" onclick="toggleAccordion(this)">
    <h2>COMPOSIZIONE</h2>
    <span class="arrow">▶</span>
  </div>

  <div id="contenitoreSquadre" class="accordion-content"></div>

</div>

<!-- =======================
     ACCORDION PARTITE
======================== -->
<div class="accordion">

  <div class="accordion-header" onclick="toggleAccordion(this)">
    <h2>PARTITE</h2>
    <span class="arrow">▶</span>
  </div>

  <div id="contenitorePartite" class="accordion-content"></div>

</div>

<!-- =======================
     ACCORDION CLASSIFICA AVULSA
======================== -->
<div class="accordion">

  <div class="accordion-header" onclick="toggleAccordion(this)">
    <h2>CLASSIFICA AVULSA</h2>
    <span class="arrow">▶</span>
  </div>

  <div id="contenitoreAvulsa" class="accordion-content"></div>

</div>

<div class="spacer"></div>

<!-- MENU -->
<div class="menu">

  <a href="index.html" class="menu-item">
    <img src="home.png" alt="Home">
    <span>Home</span>
  </a>

  <a href="gironi.html" class="menu-item active">
    <img src="gironi.png" alt="Gironi">
    <span>Gironi</span>
  </a>

  <a href="Eliminazione.html" class="menu-item">
    <img src="partite.png" alt="Partite">
    <span>Elimin.<br>diretta</span>
  </a>

</div>

<script>

  /* =======================
     TOGGLE ACCORDION
  ======================== */

  function toggleAccordion(element) {
    const accordion = element.parentElement;
    accordion.classList.toggle("open");
  }

  /* =======================
     CSV COMPOSIZIONE
  ======================== */

  const urlSquadre = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRMtFe_MpqUIVxGI0jVMJI4Y66ZhiUC-UAWMSFD9H8XSW8esfu6OjpqjQ9OoAwOS6MxTPHowZNMHGmi/pub?output=csv";

  fetch(urlSquadre)
    .then(res => res.text())
    .then(data => {

      const righe = data.split("\n").slice(1);

      const contenitore =
        document.getElementById("contenitoreSquadre");

      let gironi = {};

      righe.forEach(riga => {

        const col = riga.split(",").map(c => c.trim());

        if (col.length < 6) return;

        const girone = col[0];
        const squadra = col[1];
        const vittorie = col[2];
        const ptFatti = col[3];
        const ptSubiti = col[4];
        const quoziente = col[5];

        if (!gironi[girone]) {
          gironi[girone] = [];
        }

        gironi[girone].push([
          squadra,
          vittorie,
          ptFatti,
          ptSubiti,
          quoziente
        ]);

      });

      Object.keys(gironi).sort().forEach(g => {

        const card = document.createElement("div");
        card.className = "card";

        let squadreHTML = "";

        gironi[g].forEach(s => {

          const squadra = s[0];
          const vittorie = s[1];
          const ptFatti = s[2];
          const ptSubiti = s[3];
          const quoziente = s[4];

          squadreHTML += `

            <div style="
              padding:12px 0;
              border-bottom:1px solid #eee;
            ">

              <div style="
                font-weight:700;
                margin-bottom:8px;
              ">
                ${squadra.replace("|","<br>")}
              </div>

              <div style="
                display:grid;
                grid-template-columns: repeat(4,1fr);
                gap:8px;
                text-align:center;
                font-size:12px;
              ">

                <div>
                  <div style="color:gray;">V</div>
                  <div>${vittorie}</div>
                </div>

                <div>
                  <div style="color:gray;">PF</div>
                  <div>${ptFatti}</div>
                </div>

                <div>
                  <div style="color:gray;">PS</div>
                  <div>${ptSubiti}</div>
                </div>

                <div>
                  <div style="color:gray;">QP</div>
                  <div>${quoziente}</div>
                </div>

              </div>

            </div>

          `;

        });

        card.innerHTML = `
          <div class="girone">
            Girone ${g}
          </div>

          ${squadreHTML}
        `;

        contenitore.appendChild(card);

      });

    });

  /* =======================
     CSV PARTITE
  ======================== */

  const urlPartite = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDuicnM-HJRrsrP-sKEy9xNZMk83c7xHnWwdkKDkl48DxcsMUMH3hwixUa3FlYDo1caibG5cWqC8fS/pub?output=csv";

  fetch(urlPartite)
    .then(res => res.text())
    .then(data => {

      const righe = data.split("\n").slice(1);

      const contenitore =
        document.getElementById("contenitorePartite");

      let gironi = {};

      righe.forEach(riga => {

        const col = riga.split(",").map(c => c.trim());

        if (col.length < 6) return;

        const girone = col[0];

        if (!gironi[girone]) {
          gironi[girone] = [];
        }

        gironi[girone].push(col);

      });

      Object.keys(gironi).sort().forEach(g => {

        const titolo = document.createElement("h2");

        titolo.style.marginLeft = "15px";
        titolo.innerText = "Girone " + g;

        contenitore.appendChild(titolo);

        gironi[g].forEach(col => {

          let squadraA = col[1].replace("|", "<br>");
          let squadraB = col[2].replace("|", "<br>");

          let puntiA = parseInt(col[3]);
          let puntiB = parseInt(col[4]);

          let stato = col[5];
          let orario = col[6];
          let luogo = col[7];

          let classeA = "";
          let classeB = "";

          if (stato.trim().toLowerCase() === "finita") {

            if (puntiA > puntiB) {
              classeA = "winner";
              classeB = "loser";
            }

            else if (puntiB > puntiA) {
              classeB = "winner";
              classeA = "loser";
            }
          }

          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `

            <div style="
              display:flex;
              justify-content:space-between;
              font-size:12px;
              color:#666;
              margin-bottom:8px;
              font-weight:600;
            ">
              <div>${orario || "-"}</div>
              <div>${luogo || "-"}</div>
            </div>

            <div class="match">

              <span class="${classeA}">
                ${squadraA}
              </span>

              <div class="center">
                <div class="status">${stato}</div>
                <div class="score">
                  ${col[3]} - ${col[4]}
                </div>
              </div>

              <span class="${classeB}">
                ${squadraB}
              </span>

            </div>
          `;

          contenitore.appendChild(card);

        });

      });

    });

  /* =======================
     CSV CLASSIFICA AVULSA
  ======================== */

  const urlAvulsa = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQSHUmkziViOa-WwXJkXHmfD9Ns816nAUuq_BxAvDMYpNtwbaaAmYtunvxEcmJlrKBaHmwa3byi_x3x/pub?output=csv";

  fetch(urlAvulsa)
    .then(res => res.text())
    .then(data => {

      const righe = data.split("\n").slice(1);

      const contenitore =
        document.getElementById("contenitoreAvulsa");

      const card = document.createElement("div");
      card.className = "card";

      let classificaHTML = "";

      righe.forEach(riga => {

        const col = riga.split(",").map(c => c.trim());

        if (col.length < 6) return;

        const posizione = col[0];
        const squadra = col[1];
        const vittorie = col[2];
        const ptFatti = col[3];
        const ptSubiti = col[4];
        const quoziente = col[5];

        classificaHTML += `

          <div style="
            padding:14px 0;
            border-bottom:1px solid #eee;
          ">

            <div style="
              display:flex;
              align-items:center;
              gap:12px;
              margin-bottom:10px;
            ">

              <div style="
                width:32px;
                height:32px;
                border-radius:50%;
                background:#0072ff;
                color:white;
                display:flex;
                align-items:center;
                justify-content:center;
                font-weight:bold;
                flex-shrink:0;
              ">
                ${posizione}
              </div>

              <div style="
                font-weight:700;
                line-height:1.2;
              ">
                ${squadra.replace("|","<br>")}
              </div>

            </div>

            <div style="
              display:grid;
              grid-template-columns: repeat(4,1fr);
              gap:8px;
              text-align:center;
              font-size:12px;
            ">

              <div>
                <div style="color:gray;">V</div>
                <div>${vittorie}</div>
              </div>

              <div>
                <div style="color:gray;">PF</div>
                <div>${ptFatti}</div>
              </div>

              <div>
                <div style="color:gray;">PS</div>
                <div>${ptSubiti}</div>
              </div>

              <div>
                <div style="color:gray;">QP</div>
                <div>${quoziente}</div>
              </div>

            </div>

          </div>

        `;

      });

      card.innerHTML = classificaHTML;

      contenitore.appendChild(card);

    });

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIRONI</title>

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #eef4fb;
      color: #222;
      padding-bottom: 100px;
      overflow-x: hidden;
    }

    /* HEADER HERO */
    .header {
      position: relative;
      overflow: hidden;

      min-height: 250px;

      background:
        radial-gradient(
          circle at bottom left,
          rgba(255,180,0,0.95) 0%,
          rgba(255,180,0,0.30) 16%,
          transparent 38%
        ),

        radial-gradient(
          circle at top right,
          rgba(0,180,255,0.28) 0%,
          transparent 30%
        ),

        linear-gradient(
          135deg,
          #04152d 0%,
          #052a63 30%,
          #0052cc 65%,
          #0b74ff 100%
        );

      color: white;

      padding: 60px 24px 90px;
      text-align: center;
    }

    .header::before {
      content: "";

      position: absolute;
      inset: 0;

      background:
        repeating-linear-gradient(
          -60deg,
          rgba(255,255,255,0.04) 0px,
          rgba(255,255,255,0.04) 2px,
          transparent 2px,
          transparent 26px
        );

      opacity: 0.5;
      pointer-events: none;
    }

    .header::after {
      content: "";

      position: absolute;
      left: 0;
      bottom: 0;

      width: 100%;
      height: 120px;

      background:
        linear-gradient(
          to bottom,
          rgba(238,244,251,0) 0%,
          rgba(238,244,251,0.78) 60%,
          #eef4fb 100%
        );

      pointer-events: none;
    }

    h1 {
      position: relative;
      z-index: 2;

      margin: 0;

      font-size: 58px;
      font-weight: 900;

      line-height: 0.9;

      text-transform: uppercase;
      letter-spacing: 2px;

      font-style: italic;

      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;

      color: white;

      text-shadow:
        0 4px 0 rgba(0,0,0,0.25),
        0 12px 30px rgba(0,0,0,0.45);

      transform: skew(-5deg);
    }

    /* ACCORDION */
    .accordion {
      margin: -40px 18px 24px;
      position: relative;
      z-index: 1;
    }

    .accordion + .accordion {
      margin-top: 0;
    }

    .accordion-header {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(14px);

      padding: 20px 22px;

      border-radius: 24px;

      display: flex;
      justify-content: space-between;
      align-items: center;

      cursor: pointer;

      border: 1px solid rgba(255,255,255,0.7);

      box-shadow:
        0 10px 28px rgba(0,0,0,0.08);

      transition:
        transform 0.18s ease,
        box-shadow 0.25s ease;
    }

    .accordion-header:active {
      transform: scale(0.99);
    }

    .accordion.open .accordion-header {
      box-shadow:
        0 14px 34px rgba(0,0,0,0.10);
    }

    .accordion-header h2 {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #0f172a;
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transform: translateY(-10px);
      transition:
        max-height 0.55s ease,
        opacity 0.4s ease,
        transform 0.4s ease;

      border-radius: 24px;
    }

    .accordion.open .accordion-content {
      max-height: 10000px;
      opacity: 1;
      transform: translateY(0);
      padding-top: 16px;
    }

    .arrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .chevron {
      width: 18px;
      height: 18px;
      stroke: #0b74ff;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;

      transition: transform 0.35s cubic-bezier(0.4, 0.0, 0.2, 1);
    }

    .accordion .chevron {
      transform: rotate(0deg);
    }

    .accordion.open .chevron {
      transform: rotate(90deg) translateX(1px);
    }

    /* CARD */
    .card {
      background: white;

      margin: 0 0 16px;
      padding: 20px;

      border-radius: 26px;

      box-shadow:
        0 8px 24px rgba(0,0,0,0.07);

      border: 1px solid rgba(15,23,42,0.03);
    }

    .girone {
      display: inline-block;

      margin-bottom: 18px;

      padding: 8px 16px;

      border-radius: 999px;

      background: rgba(11,116,255,0.08);

      color: #0b74ff;

      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* MATCH */
    .match {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 10px 0;
    }

    .team-left,
    .team-right {
      flex: 1;
      line-height: 1.25;
      font-size: 14px;
      font-weight: 600;
      color: #1e293b;
    }

    .team-left {
      text-align: left;
    }

    .team-right {
      text-align: right;
    }

    .center-info {
      text-align: center;
      min-width: 85px;
    }

    .score {
      font-size: 18px;
      font-weight: 800;
      color: #0f172a;
    }

    .status {
      font-size: 10px;
      color: #64748b;
      text-transform: uppercase;
      margin-bottom: 4px;
      letter-spacing: 1px;
      font-weight: 700;
    }

    .winner {
      color: #16a34a;
      font-weight: 700;
    }

    .loser {
      color: #dc2626;
    }

    /* LOADER */
    #loader {
      position: fixed;
      inset: 0;

      background: rgba(238,244,251,0.78);
      backdrop-filter: blur(12px);

      display: flex;
      align-items: center;
      justify-content: center;

      z-index: 9999;

      transition: opacity 0.4s ease;
    }

    .loader-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;

      padding: 24px 28px;

      border-radius: 28px;

      background: rgba(255,255,255,0.88);

      border: 1px solid rgba(255,255,255,0.9);

      box-shadow:
        0 16px 40px rgba(0,0,0,0.10);
    }

    .spinner {
      width: 38px;
      height: 38px;

      border: 3px solid rgba(0,0,0,0.08);
      border-top: 3px solid #0b74ff;

      border-radius: 50%;

      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loader-text {
      font-size: 14px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: 0.5px;
    }

    /* MENU */
    .menu {
      position: fixed;
      bottom: 0;
      left: 0;

      width: 100%;

      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);

      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 1000;
      padding: 14px 0;

      border-top-left-radius: 24px;
      border-top-right-radius: 24px;

      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    }

    .menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;

      text-align: center;
      text-decoration: none;

      color: #555;

      font-size: 12px;
      font-weight: 600;

      transition: 0.2s;
    }

    .menu-item img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    .menu-item.active {
      color: #0066ff;
    }

    .spacer {
      height: 90px;
    }

    @media (max-width:480px) {

      .header {
        min-height: 220px;
        padding: 55px 20px 80px;
      }

      h1 {
        font-size: 46px;
      }

      .accordion {
        margin-left: 16px;
        margin-right: 16px;
      }

      .card {
        padding: 18px;
      }

      .team-left,
      .team-right {
        font-size: 13px;
      }

      .score {
        font-size: 16px;
      }
    }

  </style>
</head>

<body>

<div id="loader">
  <div class="loader-card">
    <div class="spinner"></div>
    <div class="loader-text" id="loaderText">Caricamento gironi...</div>
  </div>
</div>

<div class="header">
  <h1>GIRONI</h1>
</div>

<div class="accordion">
  <div class="accordion-header" onclick="toggleAccordion(this)">
    <h2>COMPOSIZIONE</h2>
<span class="arrow">
  <svg viewBox="0 0 24 24" class="chevron">
    <path d="M9 6l6 6-6 6" />
  </svg>
</span>
  </div>
  <div id="contenitoreSquadre" class="accordion-content"></div>
</div>

<div class="accordion">
  <div class="accordion-header" onclick="toggleAccordion(this)">
    <h2>PARTITE</h2>
    <span class="arrow">
  <svg viewBox="0 0 24 24" class="chevron">
    <path d="M9 6l6 6-6 6" />
  </svg>
</span>
  </div>
  <div id="contenitorePartite" class="accordion-content"></div>
</div>

<div class="accordion">
  <div class="accordion-header" onclick="toggleAccordion(this)">
    <h2>CLASSIFICA AVULSA</h2>
<span class="arrow">
  <svg viewBox="0 0 24 24" class="chevron">
    <path d="M9 6l6 6-6 6" />
  </svg>
</span>
  </div>
  <div id="contenitoreAvulsa" class="accordion-content"></div>
</div>

<div class="spacer"></div>

<div class="menu">
  <a href="index.html" class="menu-item">
    <img src="home.png" alt="Home">
    <span>Home</span>
  </a>
  <a href="gironi.html" class="menu-item active">
    <img src="gironi.png" alt="Gironi">
    <span>Gironi</span>
  </a>
  <a href="eliminazione.html" class="menu-item">
    <img src="partite.png" alt="Partite">
    <span>Fasi<br>Finali</span>
  </a>
</div>

<script>
  function toggleAccordion(element) {
    const accordion = element.parentElement;
    accordion.classList.toggle("open");
  }

  const urlSquadre = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRMtFe_MpqUIVxGI0jVMJI4Y66ZhiUC-UAWMSFD9H8XSW8esfu6OjpqjQ9OoAwOS6MxTPHowZNMHGmi/pub?output=csv";
  const urlPartite = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDuicnM-HJRrsrP-sKEy9xNZMk83c7xHnWwdkKDkl48DxcsMUMH3hwixUa3FlYDo1caibG5cWqC8fS/pub?output=csv";
  const urlAvulsa = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQSHUmkziViOa-WwXJkXHmfD9Ns816nAUuq_BxAvDMYpNtwbaaAmYtunvxEcmJlrKBaHmwa3byi_x3x/pub?output=csv";

  setTimeout(() => {
    document.getElementById("loaderText").textContent = "Aggiornamento risultati...";
  }, 1500);
  
  (async () => {
    try {
      const [resSquadre, resPartite, resAvulsa] = await Promise.all([
        fetch(urlSquadre), fetch(urlPartite), fetch(urlAvulsa)
      ]);

      const [dataSquadre, dataPartite, dataAvulsa] = await Promise.all([
        resSquadre.text(), resPartite.text(), resAvulsa.text()
      ]);

      /* COMPOSIZIONE */
      {
        const righe = dataSquadre.split("\n").slice(1);
        const contenitore = document.getElementById("contenitoreSquadre");
        let gironi = {};
        righe.forEach(riga => {
          const col = riga.split(",").map(c => c.trim());
          if (col.length < 6) return;
          if (!gironi[col[0]]) gironi[col[0]] = [];
          gironi[col[0]].push(col.slice(1));
        });

        Object.keys(gironi).sort().forEach(g => {
          const card = document.createElement("div");
          card.className = "card";
          let squadreHTML = "";
          gironi[g].forEach(s => {
            squadreHTML += `
              <div style="padding:14px 0; border-bottom:1px solid #edf2f7;">
                <div style="font-weight:700;font-size:18px; margin-bottom:10px; color:#0f172a; line-height:1.2;">${s[0].replace("|","<br>")}</div>
                <div style="display:grid; grid-template-columns: repeat(4,1fr); gap:8px; text-align:center; font-size:15px;">
                  <div><div style="color:#64748b; font-size:11px; font-weight:700; letter-spacing:1px;">V</div><div>${s[1]}</div></div>
                  <div><div style="color:#64748b; font-size:11px; font-weight:700; letter-spacing:1px;">PF</div><div>${s[2]}</div></div>
                  <div><div style="color:#64748b; font-size:11px; font-weight:700; letter-spacing:1px;">PS</div><div>${s[3]}</div></div>
                  <div><div style="color:#64748b; font-size:11px; font-weight:700; letter-spacing:1px;">QP</div><div>${s[4]}</div></div>
                </div>
              </div>`;
          });
          card.innerHTML = `<div class="girone">Girone ${g}</div>${squadreHTML}`;
          contenitore.appendChild(card);
        });
      }

      /* PARTITE */
      {
        const righe = dataPartite.split("\n").slice(1);
        const contenitore = document.getElementById("contenitorePartite");
        let gironi = {};
        righe.forEach(riga => {
          const col = riga.split(",").map(c => c.trim());
          if (col.length < 6) return;
          if (!gironi[col[0]]) gironi[col[0]] = [];
          gironi[col[0]].push(col);
        });

        Object.keys(gironi).sort().forEach(g => {
          const titolo = document.createElement("h2");
          titolo.style.cssText = "margin:8px 4px 18px; font-size:16px; color:#0f172a; letter-spacing:1px; text-transform:uppercase;";
          titolo.innerText = "Girone " + g;
          contenitore.appendChild(titolo);

          gironi[g].forEach(col => {
            let sA = col[1].replace("|", "<br>");
            let sB = col[2].replace("|", "<br>");
            let pA = parseInt(col[3]) || 0;
            let pB = parseInt(col[4]) || 0;
            let stato = col[5];
            let orario = col[6];
            let luogo = col[7];

            let clA = "", clB = "";
            if (stato.trim().toLowerCase() === "finita") {
              if (pA > pB) { clA = "winner"; clB = "loser"; }
              else if (pB > pA) { clB = "winner"; clA = "loser"; }
            }

            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
              <div style="display:flex; justify-content:space-between; font-size:11px; color:#64748b; margin-bottom:12px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase;">
                <div>${orario || "-"}</div>
                <div>${luogo || "-"}</div>
              </div>
              <div class="match">
                <div class="team-left ${clA}">${sA}</div>
                <div class="center-info">
                  <div class="status">${stato}</div>
                  <div class="score">${pA} - ${pB}</div>
                </div>
                <div class="team-right ${clB}">${sB}</div>
              </div>`;
            contenitore.appendChild(card);
          });
        });
      }

      /* CLASSIFICA AVULSA */
      {
        const righe = dataAvulsa.split("\n").slice(1);
        const contenitore = document.getElementById("contenitoreAvulsa");
        const card = document.createElement("div");
        card.className = "card";
        let classificaHTML = "";
        righe.forEach(riga => {
          const col = riga.split(",").map(c => c.trim());
          if (col.length < 6) return;
          classificaHTML += `
            <div style="padding:14px 0; border-bottom:1px solid #edf2f7;">
              <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
                <div style="width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,#00b4ff,#0066ff); color:white; display:flex; align-items:center; justify-content:center; font-weight:bold; flex-shrink:0; box-shadow:0 4px 12px rgba(0,102,255,0.25);">${col[0]}</div>
                <div style="font-weight:700;font-size:16px; line-height:1.2; color:#0f172a;">${col[1].replace("|","<br>")}</div>
              </div>
              <div style="display:grid; grid-template-columns: repeat(4,1fr); gap:8px; text-align:center; font-size:15px;">
                <div><div style="color:#64748b; font-size:11px; font-weight:700; letter-spacing:1px;">V</div><div>${col[2]}</div></div>
                <div><div style="color:#64748b; font-size:11px; font-weight:700; letter-spacing:1px;">PF</div><div>${col[3]}</div></div>
                <div><div style="color:#64748b; font-size:11px; font-weight:700; letter-spacing:1px;">PS</div><div>${col[4]}</div></div>
                <div><div style="color:#64748b; font-size:11px; font-weight:700; letter-spacing:1px;">QP</div><div>${col[5]}</div></div>
              </div>
            </div>`;
        });
        card.innerHTML = classificaHTML;
        contenitore.appendChild(card);
      }

      document.getElementById("loader").style.opacity = "0";
      document.getElementById("loader").style.pointerEvents = "none";
    } catch(err) {
      console.error(err);
      document.getElementById("loader").innerHTML = `<div class="loader-card"><div class="loader-text">Errore nel caricamento dati</div></div>`;
    }
  })();
</script>

</body>
</html>

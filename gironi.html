<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIRONI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f4f8;
    }

    .header {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      padding: 20px;
      text-align: center;
    }

    h1 { margin: 0; font-size: 24px; }

    .card {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .girone {
      font-weight: bold;
      margin-bottom: 10px;
      color: #0072ff;
    }

    .match {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
    }

    .score { font-weight: bold; }

    .center { text-align: center; }

    .status { font-size: 12px; color: gray; margin-top: 3px; }

    .winner { color: green; font-weight: bold; }
    .loser { color: red; }

    .accordion { margin: 15px; }

    .accordion-header {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      padding: 15px;
      border-radius: 18px;
      display: flex;
      justify-content: space-between;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .accordion-header h2 {
      margin: 0;
      font-size: 18px;
      color: #0072ff;
    }

    .arrow { transition: transform 0.35s ease; }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.4s ease;
    }

    .accordion.open .accordion-content {
      max-height: 5000px;
      opacity: 1;
      transform: translateY(0);
    }

    .accordion.open .arrow { transform: rotate(90deg); }

    .menu {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(255,255,255,0.95);
      display: flex;
      justify-content: space-around;
      padding: 14px 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    }

    .menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 12px;
      text-decoration: none;
      color: #555;
    }

    .menu-item.active { color: #0066ff; }

    .spacer { height: 90px; }

  </style>
</head>

<body>

<div class="header">
  <h1>GIRONI</h1>
</div>

<!-- ACCORDION COMPOSIZIONE -->
<div class="accordion">
  <div class="accordion-header" onclick="toggleAccordion(this)">
    <h2>COMPOSIZIONE</h2>
    <span class="arrow">▶</span>
  </div>
  <div id="contenitoreSquadre" class="accordion-content"></div>
</div>

<!-- ACCORDION PARTITE -->
<div class="accordion">
  <div class="accordion-header" onclick="toggleAccordion(this)">
    <h2>PARTITE</h2>
    <span class="arrow">▶</span>
  </div>
  <div id="contenitorePartite" class="accordion-content"></div>
</div>

<!-- ACCORDION AVULSA -->
<div class="accordion">
  <div class="accordion-header" onclick="toggleAccordion(this)">
    <h2>CLASSIFICA AVULSA</h2>
    <span class="arrow">▶</span>
  </div>
  <div id="contenitoreAvulsa" class="accordion-content"></div>
</div>

<div class="spacer"></div>

<div class="menu">
  <a href="index.html" class="menu-item">🏠 Home</a>
  <a href="gironi.html" class="menu-item active">🏆 Gironi</a>
  <a href="Eliminazione.html" class="menu-item">⚽ Elimin.</a>
</div>

<script>

function toggleAccordion(el) {
  el.parentElement.classList.toggle("open");
}

/* =======================
   CSV PARSER ROBUSTO
======================= */

function parseCSVLine(line) {
  const result = [];
  let current = "";
  let inQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const char = line[i];

    if (char === '"' && line[i + 1] === '"') {
      current += '"';
      i++;
    } 
    else if (char === '"') {
      inQuotes = !inQuotes;
    } 
    else if (char === "," && !inQuotes) {
      result.push(current.trim());
      current = "";
    } 
    else {
      current += char;
    }
  }

  result.push(current.trim());
  return result;
}

/* =======================
   COMPOSIZIONE
======================= */

const urlSquadre = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRMtFe_MpqUIVxGI0jVMJI4Y66ZhiUC-UAWMSFD9H8XSW8esfu6OjpqjQ9OoAwOS6MxTPHowZNMHGmi/pub?output=csv";

fetch(urlSquadre)
.then(r => r.text())
.then(data => {

  const righe = data.split(/\r?\n/).slice(1);
  const contenitore = document.getElementById("contenitoreSquadre");

  let gironi = {};

  righe.forEach(riga => {

    const col = parseCSVLine(riga);
    if (col.length < 6) return;

    const girone = col[0];

    if (!gironi[girone]) gironi[girone] = [];

    gironi[girone].push(col);
  });

  Object.keys(gironi).sort().forEach(g => {

    const card = document.createElement("div");
    card.className = "card";

    let html = "";

    gironi[g].forEach(s => {

      html += `
        <div style="padding:10px 0;border-bottom:1px solid #eee">
          <b>${s[1].replace("|","<br>")}</b>
          <div style="font-size:12px;display:grid;grid-template-columns:repeat(4,1fr);text-align:center">
            <div>V<br>${s[2]}</div>
            <div>PF<br>${s[3]}</div>
            <div>PS<br>${s[4]}</div>
            <div>QP<br>${s[5]}</div>
          </div>
        </div>
      `;
    });

    card.innerHTML = `<div class="girone">Girone ${g}</div>${html}`;
    contenitore.appendChild(card);
  });
});

/* =======================
   PARTITE
======================= */

const urlPartite = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDuicnM-HJRrsrP-sKEy9xNZMk83c7xHnWwdkKDkl48DxcsMUMH3hwixUa3FlYDo1caibG5cWqC8fS/pub?output=csv";

fetch(urlPartite)
.then(r => r.text())
.then(data => {

  const righe = data.split(/\r?\n/).slice(1);
  const contenitore = document.getElementById("contenitorePartite");

  let gironi = {};

  righe.forEach(riga => {

    const col = parseCSVLine(riga);
    if (col.length < 6) return;

    const g = col[0];
    if (!gironi[g]) gironi[g] = [];

    gironi[g].push(col);
  });

  Object.keys(gironi).sort().forEach(g => {

    const titolo = document.createElement("h2");
    titolo.style.marginLeft = "15px";
    titolo.innerText = "Girone " + g;
    contenitore.appendChild(titolo);

    gironi[g].forEach(c => {

      const card = document.createElement("div");
      card.className = "card";

      let a = c[1].replace("|","<br>");
      let b = c[2].replace("|","<br>");

      let pa = parseInt(c[3]);
      let pb = parseInt(c[4]);

      let wa = "";
      let wb = "";

      if (c[5].toLowerCase() === "finita") {
        if (pa > pb) wa = "winner", wb = "loser";
        else if (pb > pa) wb = "winner", wa = "loser";
      }

      card.innerHTML = `
        <div class="match">
          <span class="${wa}">${a}</span>
          <div class="center">
            <div class="status">${c[5]}</div>
            <div class="score">${c[3]} - ${c[4]}</div>
          </div>
          <span class="${wb}">${b}</span>
        </div>
      `;

      contenitore.appendChild(card);
    });
  });
});

/* =======================
   AVULSA
======================= */

const urlAvulsa = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQSHUmkziViOa-WwXJkXHmfD9Ns816nAUuq_BxAvDMYpNtwbaaAmYtunvxEcmJlrKBaHmwa3byi_x3x/pub?output=csv";

fetch(urlAvulsa)
.then(r => r.text())
.then(data => {

  const righe = data.split(/\r?\n/).slice(1);
  const contenitore = document.getElementById("contenitoreAvulsa");

  let html = "";

  righe.forEach(riga => {

    const c = parseCSVLine(riga);
    if (c.length < 6) return;

    html += `
      <div style="padding:10px;border-bottom:1px solid #eee">
        <b>${c[0]} - ${c[1]}</b><br>
        V:${c[2]} PF:${c[3]} PS:${c[4]} QP:${c[5]}
      </div>
    `;
  });

  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = html;

  contenitore.appendChild(card);
});

</script>

</body>
</html>

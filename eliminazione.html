<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARTITE</title>

<!-- FONT -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#f2f4f8;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:white;
  padding:20px;
  text-align:center;
}

h1{
  margin:0;
  font-size:24px;
}

/* CARD */
.card{
  background:white;
  margin:15px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* ACCORDION */
.accordion{
  margin:15px;
}

.accordion-header{
  width:100%;
  border:none;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(6px);
  padding:15px;
  border-radius:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  transition: transform 0.15s ease;
}

.accordion-header:active {
  transform: scale(0.99);
}
.accordion-header h2{
  margin:0;
  font-size:18px;
  color:#0072ff;
}

.arrow {
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.chevron {
  width: 18px;
  height: 18px;
  stroke: #0072ff;
  stroke-width: 2.5;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;

  transition: transform 0.35s cubic-bezier(0.4, 0.0, 0.2, 1);
}

/* stato chiuso */
.accordion .chevron {
  transform: rotate(0deg);
}

/* stato aperto (iOS feel: rotazione morbida + leggero shift visivo) */
.accordion.open .chevron {
  transform: rotate(90deg) translateX(1px);
}

.accordion-content{
  max-height:0;
  overflow:hidden;
  opacity:0;
  transform:translateY(-10px);
  transition:
    max-height 0.4s ease,
    opacity 0.4s ease,
    transform 0.4s ease;
}

.accordion.open .accordion-content{
  opacity:1;
  transform:translateY(0);
}

/* LOADER */
#loader{
  position:fixed;
  inset:0;
  background:rgba(242,244,248,0.75);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.loader-card{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  padding:20px 24px;
  border-radius:16px;
  background:rgba(255,255,255,0.8);
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.spinner{
  width:34px;
  height:34px;
  border:3px solid #ddd;
  border-top:3px solid #0072ff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

.loader-text{
  font-size:14px;
  font-weight:600;
  color:#333;
}

/* MENU */
.menu{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:space-around;
  padding:16px 0;
  border-top-left-radius:24px;
  border-top-right-radius:24px;
  box-shadow:0 -4px 20px rgba(0,0,0,0.08);
  align-items:center;
}

.menu-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:12px;
  text-align:center;
  text-decoration:none;
  font-weight:600;
  color:#555;
  gap:5px;
}

.menu-item img{
  width:28px;
  height:28px;
  object-fit:contain;
}

.menu-item.active{
  color:#0066ff;
}

.spacer{
  height:90px;
}

/* COLORI */
.winner{
  color:green;
  font-weight:bold;
}

.loser{
  color:red;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-card">
    <div class="spinner"></div>
    <div class="loader-text" id="loaderText">
      Caricamento partite...
    </div>
  </div>
</div>

<div class="header">
  <h1>PARTITE</h1>
</div>

<div id="container"></div>

<div class="spacer"></div>

<!-- MENU -->
<div class="menu">
  <a href="index.html" class="menu-item">
    <img src="home.png" alt="Home">
    <span>Home</span>
  </a>
  <a href="gironi.html" class="menu-item">
    <img src="gironi.png" alt="Gironi">
    <span>Gironi</span>
  </a>
  <a href="eliminazione.html" class="menu-item active">
    <img src="partite.png" alt="Eliminazione">
    <span>Fasi<br>Finali</span>
  </a>
</div>

<script>
/* =========================
   LOADER MESSAGES
========================= */
setTimeout(() => {
  document.getElementById("loaderText").textContent = "Aggiornamento risultati...";
}, 3000);

/* =========================
   ACCORDION
========================= */
async function toggleAccordion(button){
  const accordion = button.parentElement;
  const content = accordion.querySelector(".accordion-content");

  accordion.classList.toggle("open");

  if(accordion.classList.contains("open")){
    if(accordion.dataset.loaded === "false"){
      try{
        const rows = JSON.parse(accordion.dataset.rows);
        content.innerHTML = ""; 
        if(accordion.dataset.bo3 === "true"){
          renderBO3(rows, content, accordion.dataset.nome);
        }else{
          renderSingle(rows, content);
        }
        accordion.dataset.loaded = "true";
      } catch(err){
        console.error(err);
      }
    }
    content.style.maxHeight = content.scrollHeight + "px";
  } else {
    content.style.maxHeight = "0px";
  }
}

/* =========================
   CSV PARSER
========================= */
function parseCSV(text){
  const lines = text.trim().split(/\r?\n/).slice(1);
  return lines.map(line => {
    const result = [];
    let current = "";
    let quotes = false;
    for(let char of line){
      if(char === '"'){ quotes = !quotes; }
      else if(char === "," && !quotes){
        result.push(current.trim());
        current = "";
      } else {
        current += char;
      }
    }
    result.push(current.trim());
    return result;
  });
}

/* =========================
   ESCAPE HTML
========================= */
function escapeHTML(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

/* =========================
   CONFIG
========================= */
const fasi = [
  { nome:"SEDICESIMI", url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vRvtl6xtnHr7Gkc02geMIcvywqW_ZymOQsTqkRa4RnMF-P16ZabZr-Z0OmjbTR7eje4hvTRSIDbifcF/pub?output=csv", bo3:false },
  { nome:"OTTAVI", url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vRh_u5bXmhFCW1jjAt1uM2cY_83UqW3OpDOcvLKEtpDYnEnMU4IbYJtPh_ucsV2K31pcBoG4aiMtlB6/pub?output=csv", bo3:false },
  { nome:"QUARTI", url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vQJrdbINErmJLjxRr8JU11tVkcxEfQ3J3geF49C5lkhqRcxeRRyF1IDr0A39VBNXj2CYQr6zMijf-5-/pub?output=csv", bo3:true },
  { nome:"SEMIFINALI", url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSKQrkmkYFYtQHdvc_EIsc84m1jq02fqe7b4DY_Ya4zKzFfYaWtgicXPu47pLfyD8sGR4f9vvM1iuWx/pub?output=csv", bo3:true },
  { nome:"FINALI", url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSJVlFUvkt1ApLVsYxy9xz4-d8jHyrr8hnlbApzTQXo9Jo5kXkuyGjFLRoQzc6SrWPWTfgFh-pM9EN6/pub?output=csv", bo3:true }
];

/* =========================
   MATCH SINGOLO (Aggiornato layout)
========================= */
function renderSingle(rows, content){
  rows.forEach(col => {
    if(col.length < 7) return;
    const a = escapeHTML(col[0]).replaceAll("|","<br>");
    const b = escapeHTML(col[1]).replaceAll("|","<br>");
    const pa = parseInt(col[2]) || 0;
    const pb = parseInt(col[3]) || 0;
    const stato = escapeHTML(col[4] || "-");
    const data = escapeHTML(col[5] || "-");
    const luogo = escapeHTML(col[6] || "-");

    let ca = "", cb = "";
    if(stato.toLowerCase() === "finita"){
      if(pa > pb){ ca = "winner"; cb = "loser"; }
      else if(pb > pa){ cb = "winner"; ca = "loser"; }
    }

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div style="display:flex; justify-content:space-between; font-size:12px; color:#666; margin-bottom:8px;">
        <div><b>${data}</b></div>
        <div><b>${luogo}</b></div>
      </div>
      <div style="display:flex; align-items:center; justify-content:space-between; gap:5px; font-size:15px;">
        <!-- SQUADRA 1 ALLINEATA A SINISTRA -->
        <div style="flex:1; text-align:left;" class="${ca}">${a}</div>
        
        <!-- STATO E PUNTEGGIO SEMPRE AL CENTRO -->
        <div style="text-align:center; min-width:70px;">
          <div style="font-size:11px; color:#666; text-transform:lowercase; margin-bottom:2px;">${stato}</div>
          <div style="font-size:16px;"><b>${pa} - ${pb}</b></div>
        </div>
        
        <!-- SQUADRA 2 ALLINEATA A DESTRA -->
        <div style="flex:1; text-align:right;" class="${cb}">${b}</div>
      </div>
    `;
    content.appendChild(card);
  });
}

/* =========================
   BO3
========================= */
function renderBO3(rows, content, faseNome=""){
  const serie = {};
  rows.forEach(col => {
    if(col.length < 7) return;
    const squadraA = col[0].trim();
    const squadraB = col[1].trim();
    const key = [squadraA, squadraB].sort().join("||");
    if(!serie[key]){
      serie[key] = { a:squadraA, b:squadraB, matches:[] };
    }
    serie[key].matches.push(col);
  });

  let serieIndex = 0;
  Object.values(serie).forEach(s => {
    serieIndex++;
    let winsA = 0, winsB = 0, results = "";
    const teamA = escapeHTML(s.a).replaceAll("|","<br>");
    const teamB = escapeHTML(s.b).replaceAll("|","<br>");
    const firstMatch = s.matches[0];
    const data = escapeHTML(firstMatch[5] || "-");
    const luogo = escapeHTML(firstMatch[6] || "-");
    const stati = s.matches.map(m => (m[4] || "").toLowerCase().trim());
    let statoSerie = stati.every(st => st === "finita") ? "Finita" : stati.some(st => st === "finita") ? "In corso" : "Da giocare";

    s.matches.forEach((col,i) => {
      const pa = parseInt(col[2]) || 0;
      const pb = parseInt(col[3]) || 0;
      if((col[4] || "").toLowerCase() === "finita"){
        if(pa > pb) winsA++; else if(pb > pa) winsB++;
      }
      results += `
        <div style="display:flex; justify-content:space-between; padding:6px 0; border-top:1px solid #eee; font-size:15px;">
          <div>Set ${i+1}</div>
          <div>${pa} - ${pb}</div>
        </div>
      `;
    });

    let titoloSerie = (faseNome === "FINALI") ? (serieIndex === 1 ? "FINALE 3° - 4° POSTO" : "FINALE 1° - 2° POSTO") : "";
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      ${titoloSerie ? `<div style="text-align:center; font-weight:bold; color:#0072ff; margin-bottom:10px;">${titoloSerie}</div>` : ""}
      <div style="display:flex; justify-content:space-between; font-size:12px; color:#666; margin-bottom:8px;">
        <div><b>${data}</b></div>
        <div><b>${luogo}</b></div>
      </div>
      <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
        <div style="flex:1; text-align:left; font-weight:${statoSerie === "Finita" && winsA > winsB ? "bold" : "normal"}; color:${statoSerie === "Finita" && winsA > winsB ? "green" : (statoSerie === "Finita" && winsA < winsB ? "red" : "#666")};">${teamA}</div>
        <div style="padding:0 8px; font-size:12px; text-align:center; font-weight:700; color:#666;">
          <div style="text-align:center; font-size:12px; color:#666; margin-bottom:4px; font-weight:normal;">${statoSerie}</div>VS
        </div>
        <div style="flex:1; text-align:right; font-weight:${statoSerie === "Finita" && winsB > winsA ? "bold" : "normal"}; color:${statoSerie === "Finita" && winsB > winsA ? "green" : (statoSerie === "Finita" && winsB < winsA ? "red" : "#666")};">${teamB}</div>
      </div>
      ${results}
      <div style="margin-top:10px; text-align:center; font-weight:bold; color:#0072ff;">Vittorie: ${winsA} - ${winsB}</div>
    `;
    content.appendChild(card);
  });
}

/* =========================
   LOAD
========================= */
(async () => {
  const container = document.getElementById("container");
  const fragment = document.createDocumentFragment();

  for(const f of fasi){
    const accordion = document.createElement("div");
    accordion.className = "accordion";
    accordion.dataset.url = f.url;
    accordion.dataset.bo3 = f.bo3;
    accordion.dataset.nome = f.nome;
    accordion.dataset.loaded = "false";
    
    const header = document.createElement("button");
    header.className = "accordion-header";
    header.innerHTML = `<h2>${escapeHTML(f.nome)}</h2><span class="arrow">
  <svg viewBox="0 0 24 24" class="chevron">
    <path d="M9 6l6 6-6 6" />
  </svg>
</span>`;
    header.onclick = () => toggleAccordion(header);

    const content = document.createElement("div");
    content.className = "accordion-content";

    try{
      const res = await fetch(f.url);
      if(!res.ok) throw new Error("Errore rete");
      const text = await res.text();
      const rows = parseCSV(text);

      if(f.bo3){
        renderBO3(rows, content, f.nome);
      }else{
        renderSingle(rows, content);
      }
      
      accordion.dataset.rows = JSON.stringify(rows);
      accordion.dataset.loaded = "true"; 
    } catch(err){
      const errorCard = document.createElement("div");
      errorCard.className = "card";
      errorCard.textContent = "Errore nel caricamento dati";
      content.appendChild(errorCard);
    }

    accordion.appendChild(header);
    accordion.appendChild(content);
    fragment.appendChild(accordion);
  }

  container.appendChild(fragment);
  const loader = document.getElementById("loader");
  loader.style.opacity = "0";
  loader.style.pointerEvents = "none";
  loader.style.transition = "opacity 0.3s ease";
})();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PARTITE</title>

  <!-- =======================
       STILI
  ======================== -->
  <style>

    body {
      margin: 0;
      font-family: Arial;
      background: #f2f4f8;
    }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 24px;
    }

    /* =======================
       CARD PARTITE
    ======================== */
    .card {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .girone {
      font-weight: bold;
      margin-bottom: 5px;
      color: #0072ff;
    }

    .match {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
    }

    .score {
      font-weight: bold;
    }

    .center {
      text-align: center;
    }

    .status {
      font-size: 12px;
      color: gray;
      margin-top: 3px;
    }

    .winner {
      color: green;
      font-weight: bold;
    }

    .loser {
      color: red;
    }

/* =======================
   ACCORDION GIRONI
======================== */
.accordion {
  margin: 15px;
}

.accordion-header {
  background: white;
  padding: 15px;
  border-radius: 15px;

  display: flex;
  justify-content: space-between;
  align-items: center;

  cursor: pointer;

  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.accordion-header h2 {
  margin: 0;
  font-size: 18px;
  color: #0072ff;
}

#arrow {
  font-size: 18px;
  transition: transform 0.3s ease;
}

/* contenuto nascosto */
.accordion-content {
  display: none;
  margin-top: 10px;
}

/* aperto */
.accordion.open .accordion-content {
  display: block;
}

.accordion.open #arrow {
  transform: rotate(180deg);
}
    
    /* =======================
       MENU (UGUALE INDEX)
    ======================== */
    .menu {
      position: fixed;
      bottom: 0;
      left: 0;

      width: 100%;

      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);

      display: flex;
      justify-content: space-around;
      align-items: center;

      padding: 14px 0;

      border-top-left-radius: 24px;
      border-top-right-radius: 24px;

      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);

      transform: translateY(100%);
      opacity: 0;

      transition: all 0.35s ease;
    }

    .menu.show {
      transform: translateY(0);
      opacity: 1;
    }

    .menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;

      text-decoration: none;
      color: #555;

      font-size: 12px;
      font-weight: 600;
    }

    .menu-item img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    .menu-item.active {
      color: #0066ff;
    }

    /* spazio sotto per non coprire contenuto */
    .spacer {
      height: 90px;
    }

  </style>
</head>

<body>

<!-- =======================
     HEADER
======================== -->
<div class="header">
  <h1>PARTITE</h1>
</div>

<!-- CONTENUTO DINAMICO -->
<!-- =======================
     SEZIONE GIRONI COLLASSABILE
======================== -->
<div class="accordion">

  <div class="accordion-header" onclick="toggleGironi()">
    <h2>📊 Gironi</h2>
    <span id="arrow">▼</span>
  </div>

  <div id="contenitore" class="accordion-content"></div>

</div>

<div class="spacer"></div>

<!-- =======================
     MENU
======================== -->
<div class="menu">

  <a href="index.html" class="menu-item">
    <img src="home.png" alt="Home">
    <span>Home</span>
  </a>

  <a href="gironi.html" class="menu-item">
    <img src="gironi.png" alt="Gironi">
    <span>Gironi</span>
  </a>

  <a href="partite.html" class="menu-item active">
    <img src="partite.png" alt="Partite">
    <span>Partite</span>
  </a>

</div>

<!-- =======================
     SCRIPT GIRONI + MENU
======================== -->
<script>

  /* =======================
     CARICAMENTO CSV
  ======================== */
  const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDuicnM-HJRrsrP-sKEy9xNZMk83c7xHnWwdkKDkl48DxcsMUMH3hwixUa3FlYDo1caibG5cWqC8fS/pub?output=csv";

  fetch(url)
    .then(res => res.text())
    .then(data => {

      const righe = data.split("\n").slice(1);
      const contenitore = document.getElementById("contenitore");

      let gironi = {};

      /* RAGGRUPPA PER GIRONI */
      righe.forEach(riga => {

        const col = riga.split(",");
        if (col.length < 6) return;

        const girone = col[0];

        if (!gironi[girone]) {
          gironi[girone] = [];
        }

        gironi[girone].push(col);
      });

      /* ORDINA E STAMPA */
      Object.keys(gironi).sort().forEach(g => {

        const titolo = document.createElement("h2");
        titolo.style.marginLeft = "15px";
        titolo.innerText = "Girone " + g;
        contenitore.appendChild(titolo);

        gironi[g].forEach(col => {

          let squadraA = col[1];
          let squadraB = col[2];
          let puntiA = parseInt(col[3]);
          let puntiB = parseInt(col[4]);

          let classeA = "";
          let classeB = "";

          if (col[5].trim().toLowerCase() === "finita") {

            if (puntiA > puntiB) {
              classeA = "winner";
              classeB = "loser";
            } else if (puntiB > puntiA) {
              classeB = "winner";
              classeA = "loser";
            }
          }

          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <div class="match">
              <span class="${classeA}">${squadraA}</span>

              <div class="center">
                <div class="status">${col[5]}</div>
                <div class="score">${col[3]} - ${col[4]}</div>
              </div>

              <span class="${classeB}">${squadraB}</span>
            </div>
          `;

          contenitore.appendChild(card);
        });

      });
    });

  /* =======================
     MENU SHOW ON SCROLL
  ======================== */
  const menu = document.querySelector(".menu");

  window.addEventListener("scroll", () => {
    if (window.scrollY > 120) {
      menu.classList.add("show");
    } else {
      menu.classList.remove("show");
    }
  });
function toggleGironi() {
  const accordion = document.querySelector(".accordion");
  accordion.classList.toggle("open");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partite</title>

  <style>

  body {
    margin: 0;
    font-family: Arial;
    background: #f2f4f8;
  }

  /* =======================
     HEADER
  ======================== */
  .header {
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    padding: 20px;
    text-align: center;
  }

  h1 {
    margin: 0;
    font-size: 24px;
  }

  /* =======================
     CARD PARTITE
  ======================== */
  .card {
    background: white;
    margin: 15px;
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  .match {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
  }

  .center {
    text-align: center;
  }

  .status {
    font-size: 12px;
    color: gray;
  }

  .score {
    font-weight: bold;
  }

  .winner {
    color: green;
    font-weight: bold;
  }

  .loser {
    color: red;
  }

  /* =======================
     GIRONI + FASI STYLE
  ======================== */
  h2 {
    margin-left: 15px;
    color: #0072ff;
  }

  /* =======================
     STAGE ACCORDION
  ======================== */
  .stage {
    margin: 15px;
  }

  .stage-header {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);

    padding: 15px;
    border-radius: 18px;

    display: flex;
    justify-content: space-between;
    align-items: center;

    cursor: pointer;

    box-shadow: 0 6px 18px rgba(0,0,0,0.08);

    font-weight: bold;
    color: #0072ff;
  }

  .stage-content {
    max-height: 0;
    overflow: hidden;
    opacity: 0;

    transform: translateY(-8px);

    transition: all 0.4s ease;

    margin-top: 10px;
  }

  .stage.open .stage-content {
    max-height: 4000px;
    opacity: 1;
    transform: translateY(0);
  }

  /* =======================
     MENU (INDEX STYLE)
  ======================== */
  .menu {
    position: fixed;
    bottom: 0;
    left: 0;

    width: 100%;

    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);

    display: flex;
    justify-content: space-around;
    align-items: center;

    padding: 14px 0;

    border-top-left-radius: 24px;
    border-top-right-radius: 24px;

    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
  }

  .menu-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;

    text-decoration: none;
    color: #555;

    font-size: 12px;
    font-weight: 600;
  }

  .menu-item img {
    width: 28px;
    height: 28px;
    object-fit: contain;
  }

  .menu-item.active {
    color: #0066ff;
  }

  .spacer {
    height: 90px;
  }

  </style>
</head>

<body>

<!-- =======================
     HEADER
======================== -->
<div class="header">
  <h1>Partite</h1>
</div>

<!-- =======================
     GIRONI (GIÀ ESISTENTE)
======================== -->
<div id="contenitore"></div>

<!-- =======================
     ALTRE FASI TORNEO
======================== -->
<div id="torneo"></div>

<div class="spacer"></div>

<!-- =======================
     MENU
======================== -->
<div class="menu">

  <a href="index.html" class="menu-item">
    <img src="home.png">
    <span>Home</span>
  </a>

  <a href="gironi.html" class="menu-item">
    <img src="gironi.png">
    <span>Gironi</span>
  </a>

  <a href="partite.html" class="menu-item active">
    <img src="partite.png">
    <span>Partite</span>
  </a>

</div>

<!-- =======================
     SCRIPT
======================== -->
<script>

const urlGironi = "https://docs.google.com/spreadsheets/d/1Dh7ibM5iHWrgZcLHlRFzz3bbiAM_rqWmN6hIQuUZe5A/edit?usp=drive_link";

/* =======================
   GIRONI (COME PRIMA)
======================== */
fetch(urlGironi)
  .then(res => res.text())
  .then(data => {

    const righe = data.split("\n").slice(1);
    const contenitore = document.getElementById("contenitore");

    let gironi = {};

    righe.forEach(riga => {

      const col = riga.split(",");
      if (col.length < 6) return;

      const girone = col[0];

      if (!gironi[girone]) {
        gironi[girone] = [];
      }

      gironi[girone].push(col);
    });

    Object.keys(gironi).sort().forEach(g => {

      const titolo = document.createElement("h2");
      titolo.innerText = "Girone " + g;
      contenitore.appendChild(titolo);

      gironi[g].forEach(col => {

        let squadraA = col[1];
        let squadraB = col[2];
        let puntiA = parseInt(col[3]);
        let puntiB = parseInt(col[4]);

        let classeA = "";
        let classeB = "";

        if (col[5].trim().toLowerCase() === "finita") {
          if (puntiA > puntiB) {
            classeA = "winner";
            classeB = "loser";
          } else {
            classeB = "winner";
            classeA = "loser";
          }
        }

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="match">
            <span class="${classeA}">${squadraA}</span>

            <div class="center">
              <div class="status">${col[5]}</div>
              <div class="score">${col[3]} - ${col[4]}</div>
            </div>

            <span class="${classeB}">${squadraB}</span>
          </div>
        `;

        contenitore.appendChild(card);
      });

    });

  });

/* =======================
   FASI TORNEO (SOTTO GIRONI)
======================== */
const fasi = [
  { nome: "Sedicesimi", url: "CSV_SEDICESIMI.csv" },
  { nome: "Ottavi", url: "CSV_OTTAVI.csv" },
  { nome: "Quarti", url: "CSV_QUARTI.csv" },
  { nome: "Semifinali", url: "CSV_SEMIFINALI.csv" },
  { nome: "Finali", url: "CSV_FINALI.csv" }
];

const torneo = document.getElementById("torneo");

function creaStage(nome, url) {

  const stage = document.createElement("div");
  stage.className = "stage";

  stage.innerHTML = `
    <div class="stage-header" onclick="toggleStage(this)">
      <span>${nome}</span>
      <span>▶</span>
    </div>

    <div class="stage-content"></div>
  `;

  const content = stage.querySelector(".stage-content");

  fetch(url)
    .then(res => res.text())
    .then(data => {

      const righe = data.split("\n").slice(1);

      righe.forEach(riga => {

        const col = riga.split(",");
        if (col.length < 8) return;

        let squadraA = col[1];
        let squadraB = col[2];
        let puntiA = parseInt(col[3]);
        let puntiB = parseInt(col[4]);
        let stato = col[5];
        let orario = col[6];
        let luogo = col[7];

        let classeA = "";
        let classeB = "";

        if (stato.trim().toLowerCase() === "finita") {
          if (puntiA > puntiB) {
            classeA = "winner";
            classeB = "loser";
          } else {
            classeB = "winner";
            classeA = "loser";
          }
        }

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div style="display:flex;justify-content:space-between;font-size:12px;color:#666;margin-bottom:8px;font-weight:600;">
            <div>🕒 ${orario || "-"}</div>
            <div>📍 ${luogo || "-"}</div>
          </div>

          <div class="match">
            <span class="${classeA}">${squadraA}</span>

            <div class="center">
              <div class="status">${stato}</div>
              <div class="score">${col[3]} - ${col[4]}</div>
            </div>

            <span class="${classeB}">${squadraB}</span>
          </div>
        `;

        content.appendChild(card);
      });

    });

  torneo.appendChild(stage);
}

/* INIT FASI */
fasi.forEach(f => creaStage(f.nome, f.url));

/* TOGGLE */
function toggleStage(el) {
  const parent = el.parentElement;
  parent.classList.toggle("open");

  const arrow = el.querySelector("span:last-child");
  arrow.textContent = parent.classList.contains("open") ? "▼" : "▶";
}

</script>

</body>
</html>

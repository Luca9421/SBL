<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARTITE</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f4f8;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color: white;
  padding: 20px;
  text-align: center;
}

h1 {
  margin: 0;
  font-size: 24px;
}

/* CARD */
.card {
  background: white;
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.match {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
}

.score { font-weight: bold; }
.center { text-align: center; }

.status {
  font-size: 12px;
  color: gray;
}

.winner { color: green; font-weight: bold; }
.loser { color: red; }

/* ACCORDION */
.accordion {
  margin: 15px;
}

.accordion-header {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-radius: 18px;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.accordion-header h2 {
  margin: 0;
  font-size: 18px;
  color: #0072ff;
}

.arrow {
  transition: transform 0.3s ease;
}

.accordion.open .arrow {
  transform: rotate(90deg);
}

/* CONTENT */
.accordion-content {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: all 0.4s ease;
}

.accordion.open .accordion-content {
  max-height: 5000px;
  opacity: 1;
}

/* MENU */
.menu {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(255,255,255,0.95);
  display: flex;
  justify-content: space-around;
  padding: 14px 0;
  border-top-left-radius: 24px;
  border-top-right-radius: 24px;
}

.menu-item {
  text-align: center;
  font-size: 12px;
  text-decoration: none;
  color: #555;
}

.menu-item.active {
  color: #0066ff;
}

.spacer { height: 90px; }
</style>
</head>

<body>

<div class="header">
  <h1>PARTITE</h1>
</div>

<!-- GIRONI -->
<div class="accordion" data-type="gironi">
  <div class="accordion-header">
    <h2>Gironi</h2>
    <span class="arrow">▶</span>
  </div>
  <div class="accordion-content"></div>
</div>

<div class="accordion" data-type="sedicesimi">
  <div class="accordion-header">
    <h2>Sedicesimi</h2>
    <span class="arrow">▶</span>
  </div>
  <div class="accordion-content"></div>
</div>

<div class="accordion" data-type="ottavi">
  <div class="accordion-header">
    <h2>Ottavi</h2>
    <span class="arrow">▶</span>
  </div>
  <div class="accordion-content"></div>
</div>

<div class="accordion" data-type="quarti">
  <div class="accordion-header">
    <h2>Quarti</h2>
    <span class="arrow">▶</span>
  </div>
  <div class="accordion-content"></div>
</div>

<div class="accordion" data-type="semifinali">
  <div class="accordion-header">
    <h2>Semifinali</h2>
    <span class="arrow">▶</span>
  </div>
  <div class="accordion-content"></div>
</div>

<div class="accordion" data-type="finali">
  <div class="accordion-header">
    <h2>Finali</h2>
    <span class="arrow">▶</span>
  </div>
  <div class="accordion-content"></div>
</div>

<div class="spacer"></div>

<!-- MENU -->
<div class="menu">
  <a href="#" class="menu-item active">Partite</a>
</div>

<script>

const baseUrl = "https://docs.google.com/spreadsheets/d/1Dh7ibM5iHWrgZcLHlRFzz3bbiAM_rqWmN6hIQuUZe5A/edit?usp=sharing";

const urls = {
  gironi: baseUrl,
  sedicesimi: "SEDICESIMI_URL.csv",
  ottavi: "OTTAVI_URL.csv",
  quarti: "QUARTI_URL.csv",
  semifinali: "SEMIFINALI_URL.csv",
  finali: "FINALI_URL.csv"
};

/* LOAD CSV */
function loadMatches(url, container) {
  // Aggiungiamo un feedback visivo
  container.innerHTML = "<p style='padding:15px;'>Caricamento partite...</p>";

  fetch(url)
    .then(r => {
      if (!r.ok) throw new Error("Errore nel caricamento del file");
      return r.text();
    })
    .then(data => {
      // Puliamo il contenitore
      container.innerHTML = "";
      
      // Dividiamo le righe e puliamo spazi bianchi extra
      const righe = data.trim().split(/\r?\n/).slice(1);

      let gruppi = {};

      righe.forEach(riga => {
        // Riconoscimento automatico: prova il punto e virgola, se non trova nulla usa la virgola
        let c = riga.split(";");
        if (c.length < 5) c = riga.split(",");
        
        if (c.length < 5) return;

        const g = c[0].trim();
        if (!gruppi[g]) gruppi[g] = [];
        gruppi[g].push(c);
      });

      if (Object.keys(gruppi).length === 0) {
        container.innerHTML = "<p style='padding:15px;'>Nessuna partita trovata.</p>";
        return;
      }

      Object.keys(gruppi).forEach(g => {
        const title = document.createElement("h3");
        title.style.margin = "20px 15px 10px";
        title.innerText = g;
        container.appendChild(title);

        gruppi[g].forEach(c => {
          let a = c[1], b = c[2];
          let pa = parseInt(c[3]) || 0;
          let pb = parseInt(c[4]) || 0;
          let stato = (c[5] || "").trim();

          let ca = "", cb = "";

          if (stato.toLowerCase() === "finita") {
            if (pa > pb) { ca = "winner"; cb = "loser"; }
            else if (pb > pa) { cb = "winner"; ca = "loser"; }
          }

          const div = document.createElement("div");
          div.className = "card";
          div.innerHTML = `
            <div class="match">
              <span class="${ca}">${a}</span>
              <div class="center">
                <div class="status">${stato}</div>
                <div class="score">${pa} - ${pb}</div>
              </div>
              <span class="${cb}">${b}</span>
            </div>
          `;
          container.appendChild(div);
        });
      });
    })
    .catch(err => {
      container.innerHTML = `<p style='padding:15px; color:red;'>Errore: link non valido o file mancante.</p>`;
      console.error(err);
    });
}

/* ACCORDION LOGIC */
document.querySelectorAll(".accordion").forEach(acc => {
  const header = acc.querySelector(".accordion-header");
  const content = acc.querySelector(".accordion-content");

  header.addEventListener("click", () => {
    // Chiudi gli altri se vuoi un effetto pulito (opzionale)
    // document.querySelectorAll(".accordion").forEach(el => { if(el!==acc) el.classList.remove("open"); });

    acc.classList.toggle("open");

    const type = acc.dataset.type;
    // Carica i dati solo se non sono già stati caricati e se l'URL non è un placeholder
    if (!content.dataset.loaded && urls[type] && urls[type].startsWith("http")) {
      loadMatches(urls[type], content);
      content.dataset.loaded = "1";
    }
  });
});

/* ACCORDION LOGIC */
document.querySelectorAll(".accordion").forEach(acc => {

  const header = acc.querySelector(".accordion-header");
  const content = acc.querySelector(".accordion-content");

  header.addEventListener("click", () => {

    acc.classList.toggle("open");

    const type = acc.dataset.type;

    if (!content.dataset.loaded) {

      if (urls[type]) {
        loadMatches(urls[type], content);
        content.dataset.loaded = "1";
      }
    }
  });
});

</script>

</body>
</html>

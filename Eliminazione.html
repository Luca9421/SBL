<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARTITE</title>

<style>

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f2f4f8;
}

.header{
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:white;
  padding:20px;
  text-align:center;
}

h1{margin:0;font-size:24px;}

.card{
  background:white;
  margin:15px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* ACCORDION */
.accordion{margin:15px;}

.accordion-header{
  width:100%;
  border:none;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(6px);
  padding:15px;
  border-radius:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
}

.accordion-header h2{margin:0;font-size:18px;color:#0072ff;}

.arrow{transition:0.3s;}

.accordion-content{
  max-height:0;
  overflow:hidden;
  opacity:0;
  transform:translateY(-10px);
  transition:0.4s ease;
}

.accordion.open .accordion-content{
  opacity:1;
  transform:translateY(0);
}

.accordion.open .arrow{transform:rotate(90deg);}

/* SKELETON */
.skeleton{
  background:white;
  margin:15px;
  padding:15px;
  border-radius:15px;
}

.shimmer{
  height:12px;
  background:#e6e6e6;
  margin:10px 0;
  border-radius:6px;
  position:relative;
  overflow:hidden;
}

.shimmer::after{
  content:"";
  position:absolute;
  width:150px;
  height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.6),transparent);
  animation:shimmer 1.2s infinite;
}

@keyframes shimmer{
  0%{left:-150px}
  100%{left:100%}
}

.menu{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  display:flex;
  justify-content:space-around;
  padding:14px 0;
}

.menu-item{font-size:12px;color:#555;text-decoration:none;}

.menu-item.active{color:#0066ff;}

.spacer{height:90px;}

.winner{color:green;font-weight:bold;}
.loser{color:red;font-weight:bold;}

</style>
</head>

<body>

<div class="header"><h1>PARTITE</h1></div>

<div id="container"></div>
<div class="spacer"></div>

<div class="menu">
  <a href="index.html" class="menu-item">Home</a>
  <a href="gironi.html" class="menu-item">Gironi</a>
  <a href="Eliminazione.html" class="menu-item active">Elimin.<br>diretta</a>
</div>

<script>

/* =========================
   CACHE
========================= */

const CACHE_PREFIX="cache_";
const CACHE_TIME=1000*60*10;

function getCache(k){
  try{
    const r=localStorage.getItem(CACHE_PREFIX+k);
    if(!r) return null;
    const d=JSON.parse(r);
    if(Date.now()-d.t>CACHE_TIME) return null;
    return d.v;
  }catch{return null}
}

function setCache(k,v){
  localStorage.setItem(CACHE_PREFIX+k,JSON.stringify({t:Date.now(),v}));
}

/* =========================
   CSV
========================= */

function parseCSV(t){
  return t.trim().split(/\r?\n/).slice(1).map(l=>{
    let r=[],c="",q=false;
    for(let x of l){
      if(x=='"')q=!q;
      else if(x==','&&!q){r.push(c);c="";}
      else c+=x;
    }
    r.push(c);
    return r;
  });
}

function esc(s){
  return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
}

/* =========================
   CONFIG
========================= */

const fasi=[

{nome:"SEDICESIMI",url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vRvtl6xtnHr7Gkc02geMIcvywqW_ZymOQsTqkRa4RnMF-P16ZabZr-Z0OmjbTR7eje4hvTRSIDbifcF/pub?output=csv",bo3:false},

{nome:"OTTAVI",url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vRh_u5bXmhFCW1jjAt1uM2cY_83UqW3OpDOcvLKEtpDYnEnMU4IbYJtPh_ucsV2K31pcBoG4aiMtlB6/pub?output=csv",bo3:false},

{nome:"QUARTI",url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vQJrdbINErmJLjxRr8JU11tVkcxEfQ3J3geF49C5lkhqRcxeRRyF1IDr0A39VBNXj2CYQr6zMijf-5-/pub?output=csv",bo3:true},

{nome:"SEMIFINALI",url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSKQrkmkYFYtQHdvc_EIsc84m1jq02fqe7b4DY_Ya4zKzFfYaWtgicXPu47pLfyD8sGR4f9vvM1iuWx/pub?output=csv",bo3:true},

{nome:"FINALI",url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSJVlFUvkt1ApLVsYxy9xz4-d8jHyrr8hnlbApzTQXo9Jo5kXkuyGjFLRoQzc6SrWPWTfgFh-pM9EN6/pub?output=csv",bo3:true}

];

/* =========================
   ACCORDION
========================= */

function toggleAccordion(btn){
  const acc=btn.parentElement;
  const c=acc.querySelector(".accordion-content");
  acc.classList.toggle("open");

  if(acc.classList.contains("open"))
    c.style.maxHeight=c.scrollHeight+"px";
  else
    c.style.maxHeight="0px";
}

/* =========================
   SINGLE MATCH
========================= */

function single(row,cont){

  const card=document.createElement("div");
  card.className="card";

  function draw(){

    const a=esc(row[0]).replaceAll("|","<br>");
    const b=esc(row[1]).replaceAll("|","<br>");

    const pa=parseInt(row[2])||0;
    const pb=parseInt(row[3])||0;

    const st=row[4];

    let ca="",cb="";

    if(st==="finita"){
      if(pa>pb) ca="winner",cb="loser";
      else cb="winner",ca="loser";
    }

    card.innerHTML=`
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#666">
        <div>${row[5]||""}</div>
        <div>${row[6]||""}</div>
      </div>

      <div style="text-align:center;font-size:12px">${st}</div>

      <div style="display:flex;justify-content:space-between">
        <span class="${ca}">${a}</span>
        <b>${pa}-${pb}</b>
        <span class="${cb}">${b}</span>
      </div>
    `;
  }

  draw();
  cont.appendChild(card);

  return {draw};
}

/* =========================
   BO3 (GRUPPO CORRETTO)
========================= */

function bo3(rows,cont){

  const card=document.createElement("div");
  card.className="card";

  function draw(){

    const A=esc(rows[0][0]);
    const B=esc(rows[0][1]);

    let wA=0,wB=0;

    let html="";

    rows.forEach((r,i)=>{

      const pa=parseInt(r[2])||0;
      const pb=parseInt(r[3])||0;

      if(r[4]==="finita"){
        if(pa>pb) wA++;
        else wB++;
      }

      html+=`
        <div style="display:flex;justify-content:space-between;border-top:1px solid #eee">
          <div>Game ${i+1}</div><div>${pa}-${pb}</div>
        </div>
      `;
    });

    card.innerHTML=`
      <div style="display:flex;justify-content:space-between">
        <b>${A}</b><div>VS</div><b>${B}</b>
      </div>
      ${html}
      <div style="text-align:center">Vittorie ${wA}-${wB}</div>
    `;
  }

  draw();
  cont.appendChild(card);

  return {draw};
}

/* =========================
   SKELETON
========================= */

function skeleton(){
  const c=document.getElementById("container");
  c.innerHTML="";
  for(let i=0;i<3;i++){
    const s=document.createElement("div");
    s.className="skeleton";
    s.innerHTML=`<div class="shimmer"></div><div class="shimmer"></div>`;
    c.appendChild(s);
  }
}

/* =========================
   LOAD + SMART REFRESH
========================= */

(async()=>{

  const container=document.getElementById("container");

  skeleton();

  const data=[];

  for(const f of fasi){

    let rows=getCache(f.nome);

    if(!rows){
      const r=await fetch(f.url);
      rows=parseCSV(await r.text());
      setCache(f.nome,rows);
    }

    data.push({f,rows});
  }

  container.innerHTML="";

  const renders=[];

  const frag=document.createDocumentFragment();

  for(const item of data){

    const acc=document.createElement("div");
    acc.className="accordion";

    const head=document.createElement("button");
    head.className="accordion-header";
    head.innerHTML=`<h2>${item.f.nome}</h2><span class="arrow">▶</span>`;
    head.onclick=()=>toggleAccordion(head);

    const cont=document.createElement("div");
    cont.className="accordion-content";

    let local=[];

    if(item.f.bo3){
      local.push(bo3(item.rows,cont));
    }else{
      item.rows.forEach(r=>{
        local.push(single(r,cont));
      });
    }

    acc.appendChild(head);
    acc.appendChild(cont);

    frag.appendChild(acc);

    renders.push({f:item.f,rows:item.rows,local});
  }

  container.appendChild(frag);

  /* =========================
     REFRESH SOLO CAMBIATI
  ========================= */

  async function refresh(){

    for(const f of fasi){

      try{

        const r=await fetch(f.url,{cache:"no-store"});
        const newRows=parseCSV(await r.text());

        const old=getCache(f.nome);

        if(JSON.stringify(old)!==JSON.stringify(newRows)){

          setCache(f.nome,newRows);

          const acc=renders.find(x=>x.f.nome===f.nome);

          acc.local.forEach(x=>x.draw());

        }

      }catch(e){}
    }
  }

  refresh();

})();

</script>

</body>
</html>

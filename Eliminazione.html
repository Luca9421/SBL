<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PARTITE</title>

  <style>

    body {
      margin: 0;
      font-family: Arial;
      background: #f2f4f8;
    }

    .header {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 24px;
    }

    .card {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .match {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
    }

    .center {
      text-align: center;
    }

    .status {
      font-size: 12px;
      color: gray;
      margin-top: 3px;
    }

    .winner { color: green; font-weight: bold; }
    .loser { color: red; }

    /* ACCORDION */
    .accordion {
      margin: 15px;
    }

    .accordion-header {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      padding: 15px;
      border-radius: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      transition: all 0.3s ease;
    }

    .accordion-header:hover {
      transform: scale(1.01);
    }

    .accordion-header h2 {
      margin: 0;
      font-size: 18px;
      color: #0072ff;
    }

    .arrow {
      transition: transform 0.35s ease;
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transform: translateY(-10px);
      transition: 0.4s ease;
      border-radius: 15px;
    }

    .accordion.open .accordion-content {
      max-height: 10000px;
      opacity: 1;
      transform: translateY(0);
    }

    .accordion.open .arrow {
      transform: rotate(90deg);
    }

    /* MENU */
    .menu {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 14px 0;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    }

    .menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      text-decoration: none;
      color: #555;
      font-size: 12px;
      font-weight: 600;
    }

    .menu-item img {
      width: 28px;
      height: 28px;
    }

    .menu-item.active {
      color: #0066ff;
    }

    .spacer {
      height: 90px;
    }

  </style>
</head>

<body>

<div class="header">
  <h1>PARTITE</h1>
</div>

<div id="container"></div>

<div class="spacer"></div>

<!-- MENU -->
<div class="menu">

  <a href="index.html" class="menu-item">
    <img src="home.png">
    <span>Home</span>
  </a>

  <a href="gironi.html" class="menu-item">
    <img src="gironi.png">
    <span>Gironi</span>
  </a>

  <a href="Eliminazione.html" class="menu-item active">
    <img src="partite.png">
    <span>Elimin.<br>diretta</span>
  </a>

</div>

<script>

function toggleAccordion(el) {
  el.parentElement.classList.toggle("open");
}

const container = document.getElementById("container");

/* =========================
   CSV PARSER ROBUSTO
========================= */

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/).slice(1);

  return lines.map(line => {
    const result = [];
    let current = "";
    let inQuotes = false;

    for (let i = 0; i < line.length; i++) {
      const char = line[i];

      if (char === '"') {
        inQuotes = !inQuotes;
      } else if (char === ',' && !inQuotes) {
        result.push(current.trim());
        current = "";
      } else {
        current += char;
      }
    }

    result.push(current.trim());
    return result;
  });
}

/* =========================
   CONFIG FASI
========================= */

const fasi = [
  { nome: "SEDICESIMI", url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvtl6xtnHr7Gkc02geMIcvywqW_ZymOQsTqkRa4RnMF-P16ZabZr-Z0OmjbTR7eje4hvTRSIDbifcF/pub?output=csv", bo3: false },
  { nome: "OTTAVI", url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRh_u5bXmhFCW1jjAt1uM2cY_83UqW3OpDOcvLKEtpDYnEnMU4IbYJtPh_ucsV2K31pcBoG4aiMtlB6/pub?output=csv", bo3: false },
  { nome: "QUARTI", url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQJrdbINErmJLjxRr8JU11tVkcxEfQ3J3geF49C5lkhqRcxeRRyF1IDr0A39VBNXj2CYQr6zMijf-5-/pub?output=csv", bo3: true },
  { nome: "SEMIFINALI", url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSKQrkmkYFYtQHdvc_EIsc84m1jq02fqe7b4DY_Ya4zKzFfYaWtgicXPu47pLfyD8sGR4f9vvM1iuWx/pub?output=csv", bo3: true },
  { nome: "FINALI", url: "URL_FINALI", bo3: true }
];

/* =========================
   MATCH SINGOLO
========================= */

function renderSingle(rows, content) {

  rows.forEach(col => {

    if (col.length < 7) return;

    const squadraA = col[0]?.replace("|","<br>");
    const squadraB = col[1]?.replace("|","<br>");

    const puntiA = parseInt(col[2]);
    const puntiB = parseInt(col[3]);

    const stato = col[4];
    const orario = col[5];
    const luogo = col[6];

    let classeA = "";
    let classeB = "";

    if ((stato || "").toLowerCase() === "finita") {
      if (puntiA > puntiB) {
        classeA = "winner";
        classeB = "loser";
      } else if (puntiB > puntiA) {
        classeB = "winner";
        classeA = "loser";
      }
    }

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#666;margin-bottom:8px;font-weight:600;">
        <div>${orario || "-"}</div>
        <div>${luogo || "-"}</div>
      </div>

      <div class="match">

        <span class="${classeA}">${squadraA}</span>

        <div class="center">
          <div class="status">${stato || ""}</div>
          <div><b>${col[2]} - ${col[3]}</b></div>
        </div>

        <span class="${classeB}">${squadraB}</span>

      </div>
    `;

    content.appendChild(card);
  });
}

/* =========================
   BO3
========================= */

function renderBO3(rows, content) {

  const serie = {};

  rows.forEach(col => {

    if (col.length < 7) return;

    const key = [col[0], col[1]].sort().join("||");

    if (!serie[key]) {
      serie[key] = {
        a: col[0],
        b: col[1],
        matches: []
      };
    }

    serie[key].matches.push(col);
  });

  Object.values(serie).forEach(s => {

    let winsA = 0;
    let winsB = 0;

    const card = document.createElement("div");
    card.className = "card";

    const teamA = (s.a || "").replaceAll("|", "<br>");
    const teamB = (s.b || "").replaceAll("|", "<br>");

    let orario = "-";
    let campo = "-";

    let resultsHTML = "";

    s.matches.forEach((col, i) => {

      const puntiA = parseInt(col[2]);
      const puntiB = parseInt(col[3]);

      // prendo info generali dal primo match valido
      if (i === 0) {
        orario = col[5] || "-";
        campo = col[6] || "-";
      }

      let classeA = "";
      let classeB = "";

      if ((col[4] || "").toLowerCase() === "finita") {

        if (puntiA > puntiB) {
          winsA++;
          classeA = "winner";
          classeB = "loser";
        } else if (puntiB > puntiA) {
          winsB++;
          classeB = "winner";
          classeA = "loser";
        }
      }

      resultsHTML += `
        <div style="
          display:flex;
          justify-content:space-between;
          padding:6px 0;
          border-top:1px solid #eee;
          font-size:13px;
        ">

          <div style="font-weight:600;">
            Game ${i + 1}
          </div>

          <div>
            <span class="${classeA}">${col[2]}</span>
            -
            <span class="${classeB}">${col[3]}</span>
          </div>

        </div>
      `;
    });

    card.innerHTML = `
      
      <!-- HEADER MATCH -->
      <div style="
        font-weight:bold;
        color:#0072ff;
        margin-bottom:6px;
        line-height:1.3;
        font-size:15px;
      ">
        ${teamA}
        <div style="font-weight:600;color:#666;font-size:12px;">vs</div>
        ${teamB}
      </div>

      <!-- INFO -->
      <div style="
        font-size:12px;
        color:#666;
        margin-bottom:10px;
        display:flex;
        justify-content:space-between;
      ">
        <div>${orario}</div>
        <div>${campo}</div>
      </div>

      <!-- MATCHES -->
      ${resultsHTML}

      <!-- SCORE FINALE -->
      <div style="
        margin-top:10px;
        text-align:center;
        font-weight:bold;
        color:#0072ff;
      ">
        Vittorie: ${winsA} - ${winsB}
      </div>

    `;

    content.appendChild(card);
  });
}

/* =========================
   LOAD TUTTO
========================= */

(async () => {

  for (const fase of fasi) {

    const accordion = document.createElement("div");
    accordion.className = "accordion";

    const header = document.createElement("div");
    header.className = "accordion-header";
    header.innerHTML = `
      <h2>${fase.nome}</h2>
      <span class="arrow">▶</span>
    `;
    header.onclick = () => toggleAccordion(header);

    const content = document.createElement("div");
    content.className = "accordion-content";

    const res = await fetch(fase.url);
    const text = await res.text();

    const rows = parseCSV(text);

    if (fase.bo3) renderBO3(rows, content);
    else renderSingle(rows, content);

    accordion.appendChild(header);
    accordion.appendChild(content);
    container.appendChild(accordion);
  }

})();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARTITE</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f2f4f8;
}

/* HEADER */

.header{
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:white;
  padding:20px;
  text-align:center;
}

h1{
  margin:0;
  font-size:24px;
}

/* CARD */

.card{
  background:white;
  margin:15px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* ACCORDION */

.accordion{
  margin:15px;
}

.accordion-header{
  width:100%;
  border:none;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(6px);
  padding:15px;
  border-radius:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.accordion-header h2{
  margin:0;
  font-size:18px;
  color:#0072ff;
}

.arrow{
  transition:0.3s;
}

.accordion-content{
  max-height:0;
  overflow:hidden;
  opacity:0;
  transform:translateY(-10px);
  transition:max-height 0.4s ease, opacity 0.4s ease, transform 0.4s ease;
}

.accordion.open .accordion-content{
  opacity:1;
  transform:translateY(0);
}

.accordion.open .arrow{
  transform:rotate(90deg);
}

/* =========================
   SKELETON LOADER
========================= */

.skeleton-card{
  background:white;
  margin:15px;
  padding:15px;
  border-radius:15px;
  overflow:hidden;
  position:relative;
}

.skeleton-line{
  height:12px;
  border-radius:6px;
  background:#e6e6e6;
  margin:10px 0;
  position:relative;
  overflow:hidden;
}

.skeleton-line::after{
  content:"";
  position:absolute;
  top:0;
  left:-150px;
  height:100%;
  width:150px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.6),transparent);
  animation:shimmer 1.2s infinite;
}

@keyframes shimmer{
  0%{ left:-150px; }
  100%{ left:100%; }
}

/* MENU */

.menu{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(6px);
  display:flex;
  justify-content:space-around;
  padding:14px 0;
  border-top-left-radius:24px;
  border-top-right-radius:24px;
  box-shadow:0 -4px 20px rgba(0,0,0,0.08);
}

.menu-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:12px;
  text-decoration:none;
  color:#555;
}

.menu-item img{
  width:28px;
}

.menu-item.active{
  color:#0066ff;
}

.spacer{
  height:90px;
}

/* COLORI */

.winner{ color:green; font-weight:bold; }
.loser{ color:red; font-weight:bold; }

</style>
</head>

<body>

<div class="header">
  <h1>PARTITE</h1>
</div>

<div id="container"></div>

<div class="spacer"></div>

<div class="menu">

  <a href="index.html" class="menu-item">
    <img src="home.png">
    <span>Home</span>
  </a>

  <a href="gironi.html" class="menu-item">
    <img src="gironi.png">
    <span>Gironi</span>
  </a>

  <a href="Eliminazione.html" class="menu-item active">
    <img src="partite.png">
    <span>Elimin.</span>
  </a>

</div>

<script>

/* =========================
   CACHE PER FASE
========================= */

const CACHE_PREFIX = "partite_cache_";
const CACHE_TIME = 1000 * 60 * 5; // 5 minuti

function getCache(key){
  try{
    const raw = localStorage.getItem(CACHE_PREFIX + key);
    if(!raw) return null;

    const data = JSON.parse(raw);

    if(Date.now() - data.time > CACHE_TIME){
      return null;
    }

    return data.value;
  }catch(e){
    return null;
  }
}

function setCache(key,value){
  localStorage.setItem(CACHE_PREFIX + key, JSON.stringify({
    time: Date.now(),
    value
  }));
}

/* =========================
   ACCORDION
========================= */

function toggleAccordion(button){

  const accordion = button.parentElement;
  const content = accordion.querySelector(".accordion-content");

  accordion.classList.toggle("open");

  if(accordion.classList.contains("open")){
    content.style.maxHeight = content.scrollHeight + "px";
  }else{
    content.style.maxHeight = null;
  }
}

/* =========================
   CSV
========================= */

function parseCSV(text){

  const lines = text.trim().split(/\r?\n/).slice(1);

  return lines.map(line => {

    const result=[];
    let cur="";
    let q=false;

    for(const c of line){
      if(c==='"') q=!q;
      else if(c===',' && !q){
        result.push(cur.trim());
        cur="";
      }else{
        cur+=c;
      }
    }

    result.push(cur.trim());
    return result;
  });
}

/* =========================
   ESCAPE
========================= */

function esc(s){
  return String(s)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;");
}

/* =========================
   CONFIG
========================= */

const fasi = [

  { nome:"SEDICESIMI", url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vRvtl6xtnHr7Gkc02geMIcvywqW_ZymOQsTqkRa4RnMF-P16ZabZr-Z0OmjbTR7eje4hvTRSIDbifcF/pub?output=csv", bo3:false },

  { nome:"OTTAVI", url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vRh_u5bXmhFCW1jjAt1uM2cY_83UqW3OpDOcvLKEtpDYnEnMU4IbYJtPh_ucsV2K31pcBoG4aiMtlB6/pub?output=csv", bo3:false },

  { nome:"QUARTI", url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vQJrdbINErmJLjxRr8JU11tVkcxEfQ3J3geF49C5lkhqRcxeRRyF1IDr0A39VBNXj2CYQr6zMijf-5-/pub?output=csv", bo3:true },

  { nome:"SEMIFINALI", url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSKQrkmkYFYtQHdvc_EIsc84m1jq02fqe7b4DY_Ya4zKzFfYaWtgicXPu47pLfyD8sGR4f9vvM1iuWx/pub?output=csv", bo3:true },

  { nome:"FINALI", url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSJVlFUvkt1ApLVsYxy9xz4-d8jHyrr8hnlbApzTQXo9Jo5kXkuyGjFLRoQzc6SrWPWTfgFh-pM9EN6/pub?output=csv", bo3:true }

];

/* =========================
   SINGLE
========================= */

function renderSingle(rows,content){

  rows.forEach(col=>{

    if(col.length<7) return;

    const a=esc(col[0]).replaceAll("|","<br>");
    const b=esc(col[1]).replaceAll("|","<br>");

    const pa=parseInt(col[2])||0;
    const pb=parseInt(col[3])||0;

    const stato=esc(col[4]||"-");
    const data=esc(col[5]||"-");
    const luogo=esc(col[6]||"-");

    let ca="",cb="";

    if(stato.toLowerCase()==="finita"){
      if(pa>pb){ca="winner";cb="loser";}
      else if(pb>pa){cb="winner";ca="loser";}
    }

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#666">
        <div>${data}</div><div>${luogo}</div>
      </div>

      <div style="text-align:center;font-size:12px;color:#666;margin:6px 0">
        ${stato}
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="${ca}">${a}</span>
        <b>${pa} - ${pb}</b>
        <span class="${cb}">${b}</span>
      </div>
    `;

    content.appendChild(card);
  });
}

/* =========================
   BO3
========================= */

function renderBO3(rows,content,faseNome){

  const serie={};

  rows.forEach(col=>{

    if(col.length<7) return;

    const key=[col[0],col[1]].sort().join("||");

    if(!serie[key]){
      serie[key]={a:col[0],b:col[1],matches:[]};
    }

    serie[key].matches.push(col);
  });

  let iSerie=0;

  Object.values(serie).forEach(s=>{

    iSerie++;

    let wA=0,wB=0;
    let res="";

    const A=esc(s.a).replaceAll("|","<br>");
    const B=esc(s.b).replaceAll("|","<br>");

    const first=s.matches[0];

    const data=esc(first[5]||"-");
    const luogo=esc(first[6]||"-");

    const stati=s.matches.map(m=>(m[4]||"").toLowerCase());

    let statoSerie="Da giocare";

    if(stati.every(x=>x==="finita")) statoSerie="Finita";
    else if(stati.some(x=>x==="finita")) statoSerie="In corso";

    s.matches.forEach((col,k)=>{

      const pa=parseInt(col[2])||0;
      const pb=parseInt(col[3])||0;

      const st=(col[4]||"").toLowerCase();

      if(st==="finita"){
        if(pa>pb) wA++;
        else if(pb>pa) wB++;
      }

      res+=`
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid #eee;font-size:13px">
          <div>Game ${k+1}</div><div>${pa} - ${pb}</div>
        </div>
      `;
    });

    let titolo="";

    if(faseNome==="FINALI"){
      titolo=iSerie===1?"FINALE 3°-4°":"FINALE 1°-2°";
    }

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      ${titolo?`<div style="text-align:center;color:#0072ff;font-weight:bold;margin-bottom:10px">${titolo}</div>`:""}

      <div style="display:flex;justify-content:space-between;font-size:12px;color:#666;margin-bottom:8px">
        <div>${data}</div><div>${statoSerie}</div><div>${luogo}</div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="flex:1;font-weight:bold;color:${wA>wB?"green":wA<wB?"red":"#0072ff"}">${A}</div>
        <div>VS</div>
        <div style="flex:1;text-align:right;font-weight:bold;color:${wB>wA?"green":wB<wA?"red":"#0072ff"}">${B}</div>
      </div>

      ${res}

      <div style="text-align:center;margin-top:10px;color:#0072ff;font-weight:bold">
        Vittorie: ${wA} - ${wB}
      </div>
    `;

    content.appendChild(card);
  });
}

/* =========================
   SKELETON
========================= */

function showSkeleton(){

  const container=document.getElementById("container");

  container.innerHTML="";

  for(let i=0;i<4;i++){

    const sk=document.createElement("div");
    sk.className="skeleton-card";

    sk.innerHTML=`
      <div class="skeleton-line" style="width:60%"></div>
      <div class="skeleton-line" style="width:100%"></div>
      <div class="skeleton-line" style="width:80%"></div>
    `;

    container.appendChild(sk);
  }
}

/* =========================
   LOAD
========================= */

(async()=>{

  const container=document.getElementById("container");
  const loading=document.getElementById("loading");

  const fragment=document.createDocumentFragment();

  showSkeleton();

  const cacheKeyAll="all";

  const finalData=[];

  for(const f of fasi){

    const cache=getCache(f.nome);

    let rows;

    if(cache){
      rows=cache;
    }else{

      const res=await fetch(f.url);
      const text=await res.text();
      rows=parseCSV(text);

      setCache(f.nome,rows);
    }

    finalData.push({f,rows});
  }

  container.innerHTML="";

  for(const item of finalData){

    const f=item.f;
    const rows=item.rows;

    const acc=document.createElement("div");
    acc.className="accordion";

    const head=document.createElement("button");
    head.className="accordion-header";

    head.innerHTML=`
      <h2>${esc(f.nome)}</h2>
      <span class="arrow">▶</span>
    `;

    head.onclick=()=>toggleAccordion(head);

    const cont=document.createElement("div");
    cont.className="accordion-content";

    if(f.bo3) renderBO3(rows,cont,f.nome);
    else renderSingle(rows,cont);

    acc.appendChild(head);
    acc.appendChild(cont);

    fragment.appendChild(acc);
  }

  container.appendChild(fragment);

  loading.style.display="none";

})();

</script>

</body>
</html>

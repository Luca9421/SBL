<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARTITE</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f2f4f8;
}

/* HEADER */

.header{
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:white;
  padding:20px;
  text-align:center;
}

h1{
  margin:0;
  font-size:24px;
}

/* CARD */

.card{
  background:white;
  margin:15px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* ACCORDION */

.accordion{
  margin:15px;
}

.accordion-header{
  width:100%;
  border:none;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(6px);
  padding:15px;
  border-radius:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.accordion-header h2{
  margin:0;
  font-size:18px;
  color:#0072ff;
}

.arrow{
  transition:0.3s;
}

.accordion-content{
  max-height:0;
  overflow:hidden;
  opacity:0;
  transform:translateY(-10px);
  transition:
    max-height 0.4s ease,
    opacity 0.4s ease,
    transform 0.4s ease;
}

.accordion.open .accordion-content{
  opacity:1;
  transform:translateY(0);
}

.accordion.open .arrow{
  transform:rotate(90deg);
}

/* MENU */

.menu{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:space-around;
  padding:14px 0;
  border-top-left-radius:24px;
  border-top-right-radius:24px;
  box-shadow:0 -4px 20px rgba(0,0,0,0.08);
}

.menu-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:12px;
  text-decoration:none;
  font-weight: 600;
  color:#555;
  gap: 5px;
}

  .menu-item img {
    width: 28px;
    height: 28px;
    object-fit: contain;
  }

.menu-item.active{
  color:#0066ff;
}

.spacer{
  height:90px;
}

/* COLORI */

.winner{
  color:green;
  font-weight:bold;
}

.loser{
  color:red;
}

</style>
</head>

<body>

<div class="header">
  <h1>PARTITE</h1>
</div>

<div id="container"></div>

<div class="spacer"></div>

<!-- MENU -->

<div class="menu">

  <a href="index.html" class="menu-item">
    <img src="home.png" alt="Home">
    <span>Home</span>
  </a>

  <a href="gironi.html" class="menu-item">
    <img src="gironi.png" alt="Gironi">
    <span>Gironi</span>
  </a>

  <a href="Eliminazione.html" class="menu-item active">
    <img src="partite.png" alt="Eliminazione">
    <span>Elimin.<br>diretta</span>
  </a>

</div>

<script>

/* =========================
   ACCORDION
========================= */

function toggleAccordion(button){

  const accordion = button.parentElement;
  const content = accordion.querySelector(".accordion-content");

  accordion.classList.toggle("open");

  if(accordion.classList.contains("open")){
    content.style.maxHeight = content.scrollHeight + "px";
  }else{
    content.style.maxHeight = null;
  }
}

/* =========================
   CONTAINER
========================= */

const container = document.getElementById("container");

/* =========================
   CSV PARSER
========================= */

function parseCSV(text){

  const lines = text
    .trim()
    .split(/\r?\n/)
    .slice(1);

  return lines.map(line => {

    const result = [];

    let current = "";
    let quotes = false;

    for(let char of line){

      if(char === '"'){
        quotes = !quotes;
      }

      else if(char === "," && !quotes){
        result.push(current.trim());
        current = "";
      }

      else{
        current += char;
      }
    }

    result.push(current.trim());

    return result;
  });
}

/* =========================
   ESCAPE HTML
========================= */

function escapeHTML(str){

  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

/* =========================
   CONFIG
========================= */

const fasi = [

  {
    nome:"SEDICESIMI",
    url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vRvtl6xtnHr7Gkc02geMIcvywqW_ZymOQsTqkRa4RnMF-P16ZabZr-Z0OmjbTR7eje4hvTRSIDbifcF/pub?output=csv",
    bo3:false
  },

  {
    nome:"OTTAVI",
    url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vRh_u5bXmhFCW1jjAt1uM2cY_83UqW3OpDOcvLKEtpDYnEnMU4IbYJtPh_ucsV2K31pcBoG4aiMtlB6/pub?output=csv",
    bo3:false
  },

  {
    nome:"QUARTI",
    url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vQJrdbINErmJLjxRr8JU11tVkcxEfQ3J3geF49C5lkhqRcxeRRyF1IDr0A39VBNXj2CYQr6zMijf-5-/pub?output=csv",
    bo3:true
  },

  {
    nome:"SEMIFINALI",
    url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSKQrkmkYFYtQHdvc_EIsc84m1jq02fqe7b4DY_Ya4zKzFfYaWtgicXPu47pLfyD8sGR4f9vvM1iuWx/pub?output=csv",
    bo3:true
  },

  {
    nome:"FINALI",
    url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSJVlFUvkt1ApLVsYxy9xz4-d8jHyrr8hnlbApzTQXo9Jo5kXkuyGjFLRoQzc6SrWPWTfgFh-pM9EN6/pub?output=csv",
    bo3:true
  }

];

/* =========================
   MATCH SINGOLO
========================= */

function renderSingle(rows, content){

  rows.forEach(col => {

    if(col.length < 7) return;

    const a = escapeHTML(col[0]).replaceAll("|","<br>");
    const b = escapeHTML(col[1]).replaceAll("|","<br>");

    const pa = parseInt(col[2]) || 0;
    const pb = parseInt(col[3]) || 0;

    const stato = escapeHTML(col[4] || "-");
    const data = escapeHTML(col[5] || "-");
    const luogo = escapeHTML(col[6] || "-");

    let ca = "";
    let cb = "";

    if(stato.toLowerCase() === "finita"){

      if(pa > pb){
        ca = "winner";
        cb = "loser";
      }

      else if(pb > pa){
        cb = "winner";
        ca = "loser";
      }
    }

    const card = document.createElement("div");

    card.className = "card";

    card.innerHTML = `

      <div style="
        display:flex;
        justify-content:space-between;
        font-size:12px;
        color:#666;
      ">

       <div><b>${data}</b></div>

       <div><b>${luogo}</b></div>

      </div>



<div style="
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:8px;
  gap:10px;
">

        <span class="${ca}">
          ${a}
        </span>

       <div style="text-align:center;">
        <div style="font-size:12px; color:#666;">
    ${stato}
  </div>
  <b>${pa} - ${pb}</b>
 
</div>

        <span class="${cb}">
          ${b}
        </span>

      </div>

    `;

    content.appendChild(card);
  });
}

/* =========================
   BO3
========================= */

function renderBO3(rows, content, faseNome=""){

  const serie = {};

  rows.forEach(col => {

    if(col.length < 7) return;

    const squadraA = col[0].trim();
    const squadraB = col[1].trim();

    const key = [squadraA, squadraB]
      .sort()
      .join("||");

    if(!serie[key]){

      serie[key] = {
        a:squadraA,
        b:squadraB,
        matches:[]
      };
    }

    serie[key].matches.push(col);
  });

  let serieIndex = 0;

  Object.values(serie).forEach(s => {

    serieIndex++;

    let winsA = 0;
    let winsB = 0;

    let results = "";

    const teamA = escapeHTML(s.a)
      .replaceAll("|","<br>");

    const teamB = escapeHTML(s.b)
      .replaceAll("|","<br>");

    const firstMatch = s.matches[0];

    const data = escapeHTML(firstMatch[5] || "-");
    const luogo = escapeHTML(firstMatch[6] || "-");

    const stati = s.matches.map(m =>
      (m[4] || "").toLowerCase().trim()
    );

    let statoSerie = "Da giocare";

    if(stati.every(st => st === "finita")){
      statoSerie = "Finita";
    }

    else if(stati.some(st => st === "finita")){
      statoSerie = "In corso";
    }

    s.matches.forEach((col,i) => {

      const pa = parseInt(col[2]) || 0;
      const pb = parseInt(col[3]) || 0;

      const stato = (col[4] || "").toLowerCase();

      if(stato === "finita"){

        if(pa > pb){
          winsA++;
        }

        else if(pb > pa){
          winsB++;
        }
      }

      results += `

        <div style="
          display:flex;
          justify-content:space-between;
          padding:6px 0;
          border-top:1px solid #eee;
          font-size:13px;
        ">

          <div>
            Set ${i+1}
          </div>

          <div>
            ${pa} - ${pb}
          </div>

        </div>

      `;
    });

    let titoloSerie = "";

    if(faseNome === "FINALI"){

      titoloSerie = serieIndex === 1
        ? "FINALE 3° - 4° POSTO"
        : "FINALE 1° - 2° POSTO";
    }

    const card = document.createElement("div");

    card.className = "card";

    card.innerHTML = `

      ${titoloSerie ? `

        <div style="
          text-align:center;
          font-weight:bold;
          color:#0072ff;
          margin-bottom:10px;
        ">
          ${titoloSerie}
        </div>

      ` : ""}

      <!-- INFO -->

      <div style="
        display:flex;
        justify-content:space-between;
        font-size:12px;
        color:#666;
        margin-bottom:8px;
      ">

     <div><b>${data}</b></div>

<div><b>${luogo}</b></div>

      </div>

      <!-- SQUADRE -->



<div style="
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
">

        <div style="
          flex:1;
          text-align:left;
          font-weight:${
  winsA > winsB ? "bold" : "normal"
};
          color:${
            winsA > winsB
            ? "green"
            : winsA < winsB
            ? "red"
            : "#0072ff"
          };
        ">
          ${teamA}
        </div>

        <div style="
          padding:0 8px;
          font-size:12px;
          text-align:center;
          font-weight:700;
          color:#666;
        ">
        <div style="
  text-align:center;
  font-size:12px;
  color:#666;
  margin-bottom:4px;
    font-weight:normal;
">
  ${statoSerie}
</div>
          VS
        </div>

        <div style="
          flex:1;
          text-align:right;
        font-weight:${
  winsB > winsA ? "bold" : "normal"
};
          color:${
            winsB > winsA
            ? "green"
            : winsB < winsA
            ? "red"
            : "#0072ff"
          };
        ">
          ${teamB}
        </div>

      </div>

      ${results}

      <div style="
        margin-top:10px;
        text-align:center;
        font-weight:bold;
        color:#0072ff;
      ">
        Vittorie: ${winsA} - ${winsB}
      </div>

    `;

    content.appendChild(card);
  });
}

/* =========================
   LOAD
========================= */

(async () => {

  const fragment = document.createDocumentFragment();

  for(const f of fasi){

    const accordion = document.createElement("div");
    accordion.className = "accordion";

    const header = document.createElement("button");
    header.className = "accordion-header";

    header.innerHTML = `
      <h2>${escapeHTML(f.nome)}</h2>
      <span class="arrow">▶</span>
    `;

    header.onclick = () => toggleAccordion(header);

    const content = document.createElement("div");
    content.className = "accordion-content";

    try{

      const res = await fetch(f.url);

      if(!res.ok){
        throw new Error("Errore rete");
      }

      const text = await res.text();

      const rows = parseCSV(text);

      if(f.bo3){
        renderBO3(rows, content, f.nome);
      }else{
        renderSingle(rows, content);
      }

    }

    catch(err){

      const errorCard = document.createElement("div");

      errorCard.className = "card";

      errorCard.textContent =
        "Errore nel caricamento dati";

      content.appendChild(errorCard);
    }

    accordion.appendChild(header);
    accordion.appendChild(content);

    fragment.appendChild(accordion);
  }

  container.appendChild(fragment);

})();

</script>

</body>
</html>

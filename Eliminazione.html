<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARTITE</title>

<style>

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f2f4f8;
}

.header{
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:white;
  padding:20px;
  text-align:center;
}

h1{margin:0;font-size:24px;}

.card{
  background:white;
  margin:15px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* ACCORDION */
.accordion{margin:15px;}

.accordion-header{
  width:100%;
  border:none;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(6px);
  padding:15px;
  border-radius:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
}

.accordion-header h2{
  margin:0;
  font-size:18px;
  color:#0072ff;
}

.arrow{transition:0.3s;}

.accordion-content{
  max-height:0;
  overflow:hidden;
  opacity:0;
  transition:0.4s ease;
}

.accordion.open .accordion-content{
  opacity:1;
}

.accordion.open .arrow{transform:rotate(90deg);}

.winner{
  color:green;
  font-weight:800;
}

.loser{
  color:red;
  font-weight:600;
}

.menu{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:rgba(255,255,255,0.95);
  display:flex;
  justify-content:space-around;
  padding:14px 0;
}

.menu-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:12px;
  color:#555;
  text-decoration:none;
}

.menu-item.active{color:#0066ff;}

.spacer{height:90px;}

</style>
</head>

<body>

<div class="header">
  <h1>PARTITE</h1>
</div>

<div id="container"></div>

<div class="spacer"></div>

<script>

/* =========================
   CONFIG
========================= */

const fasi=[
  {nome:"SEDICESIMI",url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vRvtl6xtnHr7Gkc02geMIcvywqW_ZymOQsTqkRa4RnMF-P16ZabZr-Z0OmjbTR7eje4hvTRSIDbifcF/pub?output=csv",bo3:false},
  {nome:"OTTAVI",url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vRh_u5bXmhFCW1jjAt1uM2cY_83UqW3OpDOcvLKEtpDYnEnMU4IbYJtPh_ucsV2K31pcBoG4aiMtlB6/pub?output=csv",bo3:false},
  {nome:"QUARTI",url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vQJrdbINErmJLjxRr8JU11tVkcxEfQ3J3geF49C5lkhqRcxeRRyF1IDr0A39VBNXj2CYQr6zMijf-5-/pub?output=csv",bo3:true},
  {nome:"SEMIFINALI",url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSKQrkmkYFYtQHdvc_EIsc84m1jq02fqe7b4DY_Ya4zKzFfYaWtgicXPu47pLfyD8sGR4f9vvM1iuWx/pub?output=csv",bo3:true},
  {nome:"FINALI",url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSJVlFUvkt1ApLVsYxy9xz4-d8jHyrr8hnlbApzTQXo9Jo5kXkuyGjFLRoQzc6SrWPWTfgFh-pM9EN6/pub?output=csv",bo3:true}
];

const container=document.getElementById("container");

/* =========================
   CSV
========================= */

function parseCSV(text){
  return text.trim().split(/\r?\n/).slice(1).map(line=>{
    const res=[]; let cur="",q=false;
    for(let c of line){
      if(c=='"') q=!q;
      else if(c==","&&!q){res.push(cur);cur="";}
      else cur+=c;
    }
    res.push(cur);
    return res;
  });
}

function esc(s){
  return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;");
}

/* =========================
   SINGLE
========================= */

function renderSingle(rows,content){

  rows.forEach(c=>{
    if(c.length<7) return;

    const a=esc(c[0]), b=esc(c[1]);
    const pa=+c[2]||0, pb=+c[3]||0;
    const stato=c[4]||"-";
    const data=c[5]||"-";
    const luogo=c[6]||"-";

    let ca="",cb="";

    if(stato.toLowerCase()==="finita"){
      if(pa>pb) ca="winner";
      else cb="winner";
    }

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div style="font-size:12px;font-weight:bold;">
        ${data} — ${luogo}
      </div>

      <div style="text-align:center;font-size:12px;color:#666;">
        ${stato}
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span class="${ca}">${a}</span>
        <b>${pa} - ${pb}</b>
        <span class="${cb}">${b}</span>
      </div>
    `;

    content.appendChild(card);
  });
}

/* =========================
   BO3
========================= */

function renderBO3(rows,content){

  const serie={};

  rows.forEach(c=>{
    if(c.length<7) return;

    const a=c[0],b=c[1];
    const k=[a.toLowerCase(),b.toLowerCase()].sort().join("||");

    if(!serie[k]) serie[k]={a,b,m:[]};
    serie[k].m.push(c);
  });

  Object.values(serie).forEach(s=>{

    let wa=0,wb=0;

    const first=s.m[0];
    const data=first[5]||"-";
    const luogo=first[6]||"-";

    let stato="Da giocare";
    const stati=s.m.map(x=>(x[4]||"").toLowerCase());

    if(stati.every(x=>"finita"===x)) stato="Finita";
    else if(stati.some(x=>"finita"===x)) stato="In corso";

    const card=document.createElement("div");
    card.className="card";

    let results="";

    s.m.forEach((m,i)=>{
      const pa=+m[2]||0, pb=+m[3]||0;

      if((m[4]||"").toLowerCase()==="finita"){
        if(pa>pb) wa++; else wb++;
      }

      results+=`
        <div style="display:flex;justify-content:space-between;font-size:13px;border-top:1px solid #eee;">
          <span>Game ${i+1}</span>
          <span>${pa} - ${pb}</span>
        </div>
      `;
    });

    const winA=wa>wb?"winner":"";
    const winB=wb>wa?"winner":"";

    card.innerHTML=`
      <div style="font-size:12px;font-weight:bold;">
        <b>${data}</b> — <b>${luogo}</b>
      </div>

      <div style="text-align:center;font-size:12px;color:#666;">
        ${stato}
      </div>

      <div style="display:flex;justify-content:space-between;margin:6px 0;">
        <span class="${winA}">${s.a}</span>
        <b>VS</b>
        <span class="${winB}">${s.b}</span>
      </div>

      ${results}

      <div style="text-align:center;margin-top:6px;font-weight:bold;color:#0072ff;">
        Vittorie ${wa} - ${wb}
      </div>
    `;

    content.appendChild(card);
  });
}

/* =========================
   LAZY ACCORDION (QUI LA VERA OTTIMIZZAZIONE)
========================= */

async function loadFase(accordion,content,f){

  if(content.dataset.loaded==="true") return;

  content.innerHTML=`<div class="card">Caricamento...</div>`;

  try{
    const res=await fetch(f.url,{cache:"no-store"});
    const text=await res.text();
    const rows=parseCSV(text);

    content.innerHTML="";

    if(f.bo3) renderBO3(rows,content);
    else renderSingle(rows,content);

    content.dataset.loaded="true";

  }catch(e){
    content.innerHTML=`<div class="card">Errore caricamento</div>`;
  }
}

/* =========================
   CREATE UI (NO FETCH ALL INIT)
========================= */

fasi.forEach(f=>{

  const acc=document.createElement("div");
  acc.className="accordion";

  const btn=document.createElement("button");
  btn.className="accordion-header";

  const content=document.createElement("div");
  content.className="accordion-content";

  btn.innerHTML=`<h2>${f.nome}</h2><span class="arrow">▶</span>`;

  btn.onclick=()=>{
    acc.classList.toggle("open");

    if(acc.classList.contains("open")){
      content.style.maxHeight="2000px";
      loadFase(acc,content,f);
    }else{
      content.style.maxHeight=null;
    }
  };

  acc.appendChild(btn);
  acc.appendChild(content);

  container.appendChild(acc);
});

</script>

</body>
</html>

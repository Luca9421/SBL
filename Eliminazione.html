<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARTITE</title>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: #f2f4f8;
}

.header {
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color: white;
  padding: 20px;
  text-align: center;
}

h1 {
  margin: 0;
  font-size: 24px;
}

/* CARD */
.card {
  background: white;
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* ACCORDION */
.accordion {
  margin: 15px;
}

.accordion-header {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-radius: 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.accordion-header:hover {
  transform: scale(1.01);
}

.accordion-header h2 {
  margin: 0;
  font-size: 18px;
  color: #0072ff;
}

.arrow {
  transition: 0.35s;
}

.accordion-content {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transform: translateY(-10px);
  transition: 0.4s;
}

.accordion.open .accordion-content {
  max-height: 10000px;
  opacity: 1;
  transform: translateY(0);
}

.accordion.open .arrow {
  transform: rotate(90deg);
}

/* MENU */
.menu {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 14px 0;
  border-top-left-radius: 24px;
  border-top-right-radius: 24px;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
}

.menu-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 12px;
  text-decoration: none;
  color: #555;
}

.menu-item img {
  width: 28px;
}

.menu-item.active {
  color: #0066ff;
}

.spacer {
  height: 90px;
}

</style>
</head>

<body>

<div class="header">
  <h1>PARTITE</h1>
</div>

<div id="container"></div>

<div class="spacer"></div>

<!-- MENU -->
<div class="menu">

  <a href="index.html" class="menu-item">
    <img src="home.png">
    <span>Home</span>
  </a>

  <a href="gironi.html" class="menu-item">
    <img src="gironi.png">
    <span>Gironi</span>
  </a>

  <a href="Eliminazione.html" class="menu-item active">
    <img src="partite.png">
    <span>Elimin.</span>
  </a>

</div>

<script>

function toggleAccordion(el) {
  el.parentElement.classList.toggle("open");
}

const container = document.getElementById("container");

/* =========================
   CSV PARSER ROBUSTO
========================= */
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/).slice(1);

  return lines.map(line => {
    const res = [];
    let cur = "";
    let q = false;

    for (let c of line) {
      if (c === '"') q = !q;
      else if (c === ',' && !q) {
        res.push(cur.trim());
        cur = "";
      } else cur += c;
    }

    res.push(cur.trim());
    return res;
  });
}

/* =========================
   CONFIG FASI
========================= */

	const fasi = [
  { nome: "SEDICESIMI", url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvtl6xtnHr7Gkc02geMIcvywqW_ZymOQsTqkRa4RnMF-P16ZabZr-Z0OmjbTR7eje4hvTRSIDbifcF/pub?output=csv", bo3: false },
  { nome: "OTTAVI", url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRh_u5bXmhFCW1jjAt1uM2cY_83UqW3OpDOcvLKEtpDYnEnMU4IbYJtPh_ucsV2K31pcBoG4aiMtlB6/pub?output=csv", bo3: false },
  { nome: "QUARTI", url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQJrdbINErmJLjxRr8JU11tVkcxEfQ3J3geF49C5lkhqRcxeRRyF1IDr0A39VBNXj2CYQr6zMijf-5-/pub?output=csv", bo3: true },
  { nome: "SEMIFINALI", url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSKQrkmkYFYtQHdvc_EIsc84m1jq02fqe7b4DY_Ya4zKzFfYaWtgicXPu47pLfyD8sGR4f9vvM1iuWx/pub?output=csv", bo3: true },
  { nome: "FINALI", url: "URL_FINALI", bo3: true }
];

/* =========================
   MATCH SINGOLO
========================= */
function renderSingle(rows, content) {

  rows.forEach(col => {

    if (col.length < 7) return;

    const card = document.createElement("div");
    card.className = "card";

    let a = col[0].replaceAll("|","<br>");
    let b = col[1].replaceAll("|","<br>");

    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#666;">
        <div>${col[5] || "-"}</div>
        <div>${col[6] || "-"}</div>
      </div>

      <div style="display:flex;justify-content:space-between;margin-top:10px;">

        <span>${a}</span>

        <div style="text-align:center;">
          <div>${col[4]}</div>
          <b>${col[2]} - ${col[3]}</b>
        </div>

        <span>${b}</span>

      </div>
    `;

    content.appendChild(card);
  });
}

/* =========================
   BO3 FIXATO
========================= */
function renderBO3(rows, content) {

  const serie = {};

  rows.forEach(col => {

    if (col.length < 7) return;

    const key = [col[0], col[1]].sort().join("||");

    if (!serie[key]) {
      serie[key] = {
        a: col[0],
        b: col[1],
        matches: []
      };
    }

    serie[key].matches.push(col);
  });

  Object.values(serie).forEach(s => {

    let winsA = 0;
    let winsB = 0;

    let orario = "-";
    let campo = "-";

    let results = "";

    s.matches.forEach((col, i) => {

      if (i === 0) {
        orario = col[5];
        campo = col[6];
      }

      let pa = parseInt(col[2]);
      let pb = parseInt(col[3]);

      let ca = "";
      let cb = "";

      if ((col[4] || "").toLowerCase() === "finita") {
        if (pa > pb) { winsA++; ca = "winner"; cb = "loser"; }
        else if (pb > pa) { winsB++; cb = "winner"; ca = "loser"; }
      }

      results += `
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid #eee;">
          <div>Game ${i+1}</div>
          <div>
            <span class="${ca}">${col[2]}</span> - <span class="${cb}">${col[3]}</span>
          </div>
        </div>
      `;
    });

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">

        <div style="text-align:right;flex:1;font-weight:bold;">
          ${s.a.replaceAll("|","<br>")}
        </div>

        <div style="padding:0 10px;">VS</div>

        <div style="text-align:left;flex:1;font-weight:bold;">
          ${s.b.replaceAll("|","<br>")}
        </div>

      </div>

      <div style="font-size:12px;color:#666;display:flex;justify-content:space-between;margin-bottom:10px;">
        <div>${orario}</div>
        <div>${campo}</div>
      </div>

      ${results}

      <div style="margin-top:10px;text-align:center;font-weight:bold;color:#0072ff;">
        Vittorie: ${winsA} - ${winsB}
      </div>

    `;

    content.appendChild(card);
  });
}

/* =========================
   LOAD
========================= */

(async () => {

  for (const f of fasi) {

    const acc = document.createElement("div");
    acc.className = "accordion";

    const h = document.createElement("div");
    h.className = "accordion-header";
    h.innerHTML = `<h2>${f.nome}</h2><span class="arrow">▶</span>`;
    h.onclick = () => toggleAccordion(h);

    const c = document.createElement("div");
    c.className = "accordion-content";

    const res = await fetch(f.url);
    const text = await res.text();
    const rows = parseCSV(text);

    if (f.bo3) renderBO3(rows, c);
    else renderSingle(rows, c);

    acc.appendChild(h);
    acc.appendChild(c);
    container.appendChild(acc);
  }

})();

</script>

</body>
</html>
